<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>UhaMap</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body { margin:0; font-family:Arial; }
#map { height:100vh; }

.panel {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:white;
  padding:12px;
  display:none;
}

.admin {
  position:fixed;
  right:0;
  top:0;
  width:300px;
  height:100%;
  background:#fff;
  overflow:auto;
  display:none;
}
</style>
</head>

<body>

<div id="map"></div>
<div class="panel" id="panel"></div>
<div class="admin" id="admin"></div>

<script>

const tg = window.Telegram.WebApp;
tg.expand();

const API = "PUT_API_URL";

let map;
let current;

// ================= FULL CATEGORY ICONS =================
function getIcon(cat) {

  const icons = {
    "рыбалка": "🎣",
    "платная рыбалка": "💰🎣",
    "кемпинг": "⛺",
    "лагерь": "🏕️",
    "палатка": "⛺",
    "база отдыха": "🏡",

    "пляж": "🏖️",
    "платный пляж": "💰🏖️",
    "купание": "🌊",
    "спуск катера": "🚤",
    "пирс": "🌉",

    "опасно": "⚠️",
    "зимний проезд": "❄️",

    "родник": "💧",
    "колодец": "🪣",
    "арт-объект": "🎨",
    "достопримечательность": "🏛️",
    "загадочное место": "❓",
    "дикое место": "🌲",

    "пожарная часть": "🚒",
    "медпомощь": "🏥",
    "туалет": "🚻",
    "мусор": "🗑️"
  };

  return L.divIcon({
    html: `<div style="font-size:20px">${icons[cat] || "📍"}</div>`,
    className: ""
  });
}

// ================= INIT =================
function init() {

  map = L.map('map').setView([55, 37], 10);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  map.on("click", e => {
    current = e.latlng;
    openForm();
  });

  loadPoints();
  loadAdmin();
}

// ================= LOAD POINTS =================
async function loadPoints() {

  const res = await fetch(API + "?action=getPoints");
  const data = await res.json();

  data.forEach(p => {
    L.marker([p.lat, p.lng], { icon: getIcon(p.category) })
      .addTo(map)
      .bindPopup(p.category);
  });
}

// ================= SAVE =================
async function save(category, desc) {

  await fetch(API, {
    method: "POST",
    body: JSON.stringify({
      action: "savePoint",
      data: {
        lat: current.lat,
        lng: current.lng,
        category,
        description: desc,
        user_id: tg.initDataUnsafe?.user?.id,
        user_name: tg.initDataUnsafe?.user?.first_name
      }
    })
  });

  alert("Отправлено");
}

// ================= ADMIN =================
async function loadAdmin() {

  const res = await fetch(API + "?action=getPending");
  const data = await res.json();

  const box = document.getElementById("admin");
  box.style.display = "block";

  box.innerHTML = "<h3>Модерация</h3>";

  data.forEach(p => {

    const div = document.createElement("div");

    div.innerHTML = `
      <b>${p.category}</b><br>
      ${p.user}<br>
      <button onclick="approve('${p.id}')">Approve</button>
    `;

    box.appendChild(div);
  });
}

function approve(id) {
  fetch(API, {
    method: "POST",
    body: JSON.stringify({ action: "approve", id })
  });
}

init();

</script>

</body>
</html>
