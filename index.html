<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UhaMap</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body { margin:0; font-family:Arial; }
#map { height:100vh; }

.menu {
  position:fixed;
  top:10px;
  left:10px;
  z-index:9999;
}

.menu button {
  background:#2a9d8f;
  color:#fff;
  border:none;
  padding:10px;
  border-radius:10px;
  margin-bottom:5px;
}

.panel {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  padding:15px;
  border-radius:20px 20px 0 0;
  display:none;
  z-index:9999;
  height:33vh;
  max-height:90vh;
  overflow-y:auto;
  box-shadow:0 -5px 20px rgba(0,0,0,0.2);
}

.handle {
  text-align:center;
  font-size:22px;
  cursor:pointer;
}

.photos img {
  width:70px;
  height:70px;
  object-fit:cover;
  margin:5px;
  border-radius:8px;
}

.selected-marker {
  transform: scale(1.5);
}
</style>
</head>

<body>

<div id="map"></div>

<div class="menu">
  <button onclick="openMyPoints()">📂 Мои точки</button>
</div>

<div class="panel" id="panel">
  <div class="handle" onclick="togglePanel()">—</div>

  <h3 id="title">📍 Новая точка</h3>
  <div id="coords"></div>

  <select id="category"></select>

  <select id="access">
    <option>легковой</option>
    <option>внедорожник</option>
    <option>пешком</option>
    <option>лодка</option>
  </select>

  <textarea id="desc" placeholder="Описание"></textarea>

  <button onclick="requestCamera()">📸 Фото</button>
  <input type="file" id="camera" accept="image/*" capture="environment" hidden>

  <div class="photos" id="photos"></div>

  <button onclick="saveDraft()">Сохранить</button>
  <button onclick="closePanel()">Закрыть</button>
</div>

<div class="panel" id="infoPanel">
  <div class="handle" onclick="closeInfo()">—</div>
  <div id="infoContent"></div>
</div>

<script>

let map;
let current = null;
let tempMarker = null;
let userMarker = null;
let photos = [];

let editMode = false;
let editId = null;

let activeMarker = null;

/* =========================
   CONTROLLER
========================= */
const MapController = {

  setActive(marker, data){

    this.clearActive();

    activeMarker = marker;

    if(marker && marker.getElement){
      const el = marker.getElement();
      if(el) el.classList.add("selected-marker");
    }

    current = { lat:data.lat, lng:data.lng };

    this.center(data.lat, data.lng);
  },

  clearActive(){
    if(activeMarker){
      const el = activeMarker.getElement?.();
      if(el) el.classList.remove("selected-marker");
    }
    activeMarker = null;
  },

  center(lat,lng){

    const zoom = map.getZoom();
    const offset = window.innerHeight / 6;

    const point = map.project([lat,lng], zoom).subtract([0,offset]);
    const target = map.unproject(point, zoom);

    map.setView(target, zoom, { animate:true });
  }
};

/* ICONS */
const icons = {
  "рыбалка":"🎣",
  "платная рыбалка":"💰🎣",
  "кемпинг":"⛺",
  "пляж":"🏖️",
  "опасно":"⚠️",
  "родник":"💧",
  "пирс":"🌉"
};

function icon(cat){
  return L.divIcon({
    html:`<div style="font-size:22px">${icons[cat]||"📍"}</div>`,
    className:""
  });
}

/* INIT */
function init(){

  map = L.map("map").setView([55,37],10);

  const osm = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png");

  const sat = L.tileLayer("https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}",{
    subdomains:["mt0","mt1","mt2","mt3"]
  });

  osm.addTo(map);

  L.control.layers({ "OSM":osm, "SAT":sat }).addTo(map);

  /* =========================
     🔵 ГЕОЛОКАЦИЯ ПОЛЬЗОВАТЕЛЯ
  ========================= */
  map.locate({
    setView:false,
    watch:true,
    enableHighAccuracy:true
  });

  map.on("locationfound", e => {

    const latlng = e.latlng;

    if(userMarker){
      map.removeLayer(userMarker);
    }

    userMarker = L.circleMarker(latlng,{
      radius:8,
      color:"blue",
      fillColor:"blue",
      fillOpacity:1
    }).addTo(map);

    userMarker.bindPopup("📍 Вы здесь");
  });

  map.on("click", e=>{

    MapController.clearActive();

    current = e.latlng;

    if(tempMarker) map.removeLayer(tempMarker);

    tempMarker = L.marker(current,{icon:icon("рыбалка")}).addTo(map);

    MapController.center(current.lat,current.lng);

    openPanel();
  });

  fillCategories();
  PointStore.sync();
}

/* CATEGORY */
function fillCategories(){
  category.innerHTML="";
  Object.keys(icons).forEach(c=>{
    let o=document.createElement("option");
    o.value=c;
    o.innerText=`${icons[c]} ${c}`;
    category.appendChild(o);
  });
}

/* PHOTO */
camera.onchange = e=>{
  const file=e.target.files[0];
  if(!file) return;

  const r=new FileReader();
  r.onload=ev=>{
    photos.push(ev.target.result);
    renderPhotos();
  };
  r.readAsDataURL(file);
};

function renderPhotos(){
  photosEl.innerHTML="";
  photos.forEach((p,i)=>{
    let img=document.createElement("img");
    img.src=p;
    img.onclick=()=>{
      photos.splice(i,1);
      renderPhotos();
    };
    photosEl.appendChild(img);
  });
}

/* STORE */
const PointStore={
  sync(){

    const arr=JSON.parse(localStorage.getItem("points")||"[]");

    if(window.layer){
      window.layer.clearLayers();
    } else {
      window.layer=L.layerGroup().addTo(map);
    }

    arr.forEach(p=>{

      const m=L.marker([p.lat,p.lng],{icon:icon(p.category)});

      m.on("click",()=>{

        MapController.setActive(m,p);

        openInfo(p);
      });

      window.layer.addLayer(m);
    });
  }
};

/* INFO */
function openInfo(p){

  infoPanel.style.display="block";

  infoContent.innerHTML=`
    <b>${icons[p.category]} ${p.category}</b><br>
    📍 ${p.lat}, ${p.lng}<br>
    📝 ${p.desc||""}<br>
    ${(p.photos||[]).map(ph=>`<img src="${ph}" width="60">`).join("")}
  `;
}

function closeInfo(){
  infoPanel.style.display="none";
}

/* PANEL */
function openPanel(){
  panel.style.display="block";
  coords.innerText=current.lat.toFixed(5)+","+current.lng.toFixed(5);
}

function closePanel(){
  panel.style.display="none";
  editMode=false;
  editId=null;
}

/* INIT */
init();

</script>
</body>
</html>
