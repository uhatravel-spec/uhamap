<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UhaMap</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body { margin:0; font-family:Arial; }
#map { height:100vh; }

.menu {
  position:fixed;
  top:10px;
  left:10px;
  z-index:9999;
}

.menu button {
  background:#2a9d8f;
  color:#fff;
  border:none;
  padding:10px;
  border-radius:10px;
  margin-bottom:5px;
}

.panel {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  padding:15px;
  border-radius:20px 20px 0 0;
  display:none;
  z-index:9999;

  height:33vh;
  max-height:90vh;

  overflow-y:auto;
  -webkit-overflow-scrolling: touch;

  box-shadow:0 -5px 20px rgba(0,0,0,0.2);
  transition:height 0.2s ease;
}

.handle {
  text-align:center;
  font-size:22px;
  cursor:pointer;
  margin-bottom:5px;
}

.row { margin-bottom:10px; }

select, textarea, button {
  width:100%;
  padding:10px;
}

.photos img {
  width:70px;
  height:70px;
  object-fit:cover;
  margin:5px;
  border-radius:8px;
}

/* selected marker */
.selected-marker {
  transform: scale(1.5);
}

/* 🔵 user ring marker */
.user-ring {
  width:18px;
  height:18px;
  border-radius:50%;
  border:3px solid #1e90ff;
  background:rgba(30,144,255,0.2);
  box-shadow:0 0 10px rgba(30,144,255,0.6);
}
</style>
</head>

<body>

<div id="map"></div>

<div class="menu">
  <button onclick="openMyPoints()">📂 Мои точки</button>
  <button onclick="enableCreateMode()">➕ Создать точку</button>
</div>

<div class="panel" id="panel">
  <div class="handle" onclick="togglePanel()">—</div>

  <h3 id="title">📍 Новая точка</h3>
  <div id="coords"></div>

  <div class="row">
    <select id="category"></select>
  </div>

  <div class="row">
    <select id="access">
      <option>легковой</option>
      <option>внедорожник</option>
      <option>пешком</option>
      <option>лодка</option>
    </select>
  </div>

  <div class="row">
    <textarea id="desc" placeholder="Описание"></textarea>
  </div>

  <button onclick="requestCamera()">📸 Фото</button>
  <input type="file" id="camera" accept="image/*" capture="environment" hidden>

  <div class="photos" id="photos"></div>

  <button onclick="saveDraft()">Сохранить</button>
  <button onclick="publish()">Опубликовать</button>
  <button onclick="closePanel()">Закрыть</button>
</div>

<div class="panel" id="myPanel"></div>

<div class="panel" id="infoPanel" style="height:25vh;">
  <div class="handle" onclick="closeInfo()">—</div>
  <div id="infoContent"></div>
</div>

<script>

const tg = window.Telegram.WebApp;
tg.expand();

const API = "YOUR_API_URL";

let map;
let current = null;
let tempMarker = null;
let userMarker = null;
let photos = [];

let editMode = false;
let editId = null;

let activeMarker = null;
let activePointId = null;

let createMode = false;

let userZoomChanged = false;
let panelOpen = false;

/* PANEL */
const panelEl = document.getElementById("panel");
const infoPanel = document.getElementById("infoPanel");
const myPanel = document.getElementById("myPanel");


function setPanel(h){
  panelEl.style.height = (window.innerHeight * h) + "px";
}

function togglePanel(){
  setPanel(0.1);
}

/* OFFSET */
function centerWithOffset(lat,lng){
  const offset = window.innerHeight * 0.16;

  const point = map.project([lat,lng], map.getZoom()).subtract([0, offset]);
  const newLatLng = map.unproject(point, map.getZoom());

  if(!userZoomChanged){
    map.setView(newLatLng, map.getZoom());
  } else {
    map.panTo(newLatLng);
  }
}

/* ICONS */
const icons = {
  "рыбалка":"🎣",
  "платная рыбалка":"💰🎣",
  "кемпинг":"⛺",
  "пляж":"🏖️",
  "опасно":"⚠️",
  "родник":"💧",
  "пирс":"🌉"
};

function icon(cat){
  return L.divIcon({
    html:`<div style="font-size:22px">${icons[cat] || "📍"}</div>`,
    className:""
  });
}

/* INIT */
function init(){

  map = L.map('map').setView([55,37],10);

  const normal = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');

  const sat = L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
  );

  normal.addTo(map);

  L.control.layers({
    "Обычная":normal,
    "Спутник":sat
  }).addTo(map);

  map.on("zoomend", ()=> userZoomChanged = true);
  map.on("dragstart", ()=> userZoomChanged = true);

  map.locate({watch:true, enableHighAccuracy:true});

  map.on("locationfound", e=>{
    const latlng = e.latlng;

    if(!userMarker){
      userMarker = L.marker(latlng,{
        icon: L.divIcon({
          className:"",
          html:`<div class="user-ring"></div>`
        })
      }).addTo(map);
    } else {
      userMarker.setLatLng(latlng);
    }
  });

  map.on("click", e=>{

    if(!createMode) return;

    current = e.latlng;

    if(tempMarker) map.removeLayer(tempMarker);

    tempMarker = L.marker(current,{icon: icon("рыбалка")}).addTo(map);

    centerWithOffset(current.lat,current.lng);

    openPanel();
  });

  fillCategories();
  PointStore.sync();
}

/* CREATE MODE */
function enableCreateMode(){
  createMode = true;
}

/* CATEGORY */
function fillCategories(){
  const sel = category;
  sel.innerHTML="";
  Object.keys(icons).forEach(c=>{
    let o=document.createElement("option");
    o.value=c;
    o.innerHTML=`${icons[c]} ${c}`;
    sel.appendChild(o);
  });
}

/* PHOTO FIX */
const photosEl = document.getElementById("photos");

function requestCamera(){ camera.click(); }

camera.onchange=e=>{
  const file=e.target.files[0];
  if(!file) return;

  const r=new FileReader();
  r.onload=ev=>{
    photos.push(ev.target.result);
    renderPhotos();
  };
  r.readAsDataURL(file);
};

function renderPhotos(){
  photosEl.innerHTML="";
  photos.forEach((p,i)=>{
    let img=document.createElement("img");
    img.src=p;
    img.onclick=()=>{ photos.splice(i,1); renderPhotos(); };
    photosEl.appendChild(img);
  });
}

/* SAVE */
function saveDraft(){
  let arr=JSON.parse(localStorage.getItem("points")||"[]");

  if(editMode){
    arr=arr.map(p=>p.id===editId ? {...p,category:category.value,access:access.value,desc:desc.value,photos} : p);
  } else {
    arr.push({
      id:Date.now(),
      lat:current.lat,
      lng:current.lng,
      category:category.value,
      access:access.value,
      desc:desc.value,
      photos,
      status:"local"
    });
  }

  localStorage.setItem("points",JSON.stringify(arr));

  PointStore.sync();
  closePanel();
}

/* INFO */
function openInfo(p){
  panelOpen = true;

  activePointId = p.id;

  const box = document.getElementById("infoContent");

  box.innerHTML = `
    <b>${icons[p.category]} ${p.category}</b><br>
    📍 ${p.lat.toFixed(5)}, ${p.lng.toFixed(5)}<br>
    🚗 ${p.access}<br>
    📝 ${p.desc || ""}<br>
    ${(p.photos||[]).map(ph=>`<img src="${ph}" width="60">`).join("")}
    <button onclick="editPoint(${p.id})">✏️ Изменить</button>
    <button onclick="deletePoint(${p.id})">🗑 Удалить</button>
  `;

  infoPanel.style.display="block";
}

/* STORE */
const PointStore={
  sync(){
    const arr=JSON.parse(localStorage.getItem("points")||"[]");

    if(window.layer){
      window.layer.clearLayers();
    } else {
      window.layer=L.layerGroup().addTo(map);
    }

    arr.forEach(p=>{
      const m=L.marker([p.lat,p.lng],{icon:icon(p.category)});
      m._data=p;

      if(p.id===activePointId){
        highlightMarker(m);
      }

      m.on("click",()=>{

        activePointId = p.id;

        highlightMarker(m);

        current={lat:p.lat,lng:p.lng};

        centerWithOffset(p.lat,p.lng);

        openInfo(p);
      });

      window.layer.addLayer(m);
    });
  }
};

/* HIGHLIGHT */
function highlightMarker(marker){

  if(activeMarker && activeMarker.getElement()){
    activeMarker.getElement().classList.remove("selected-marker");
  }

  activeMarker = marker;

  const el = marker.getElement();
  if(el){
    el.classList.add("selected-marker");
  }
}

/* MY POINTS */
function openMyPoints(){
  const box=myPanel;
  box.style.display="block";
  box.innerHTML="<div class='handle' onclick='toggleMyPanel()'>—</div><h3>Мои точки</h3>";

  const arr=JSON.parse(localStorage.getItem("points")||"[]");

  arr.forEach(p=>{
    const d=document.createElement("div");

    d.style.background = (p.id===activePointId) ? "#e0f0ff" : "";

    d.innerHTML=`
      <hr>
      ${icons[p.category]} ${p.category}<br>
      ${p.desc||""}<br>
      <button onclick="focusPoint(${p.lat},${p.lng})">Показать</button>
      <button onclick="editPoint(${p.id})">Изменить</button>
      <button onclick="deletePoint(${p.id})">Удалить</button>
    `;

    box.appendChild(d);
  });

  box.style.height="33vh";
}

function toggleMyPanel(){
  myPanel.style.height="33vh";
}

function focusPoint(lat,lng){
  centerWithOffset(lat,lng);
}

/* EDIT */
function editPoint(id){
  const arr=JSON.parse(localStorage.getItem("points")||"[]");
  const p=arr.find(x=>x.id===id);
  if(!p) return;

  editMode=true;
  editId=id;

  current={lat:p.lat,lng:p.lng};

  category.value=p.category;
  access.value=p.access;
  desc.value=p.desc;

  photos=[...(p.photos||[])];
  renderPhotos();

  title.innerText="✏️ Редактирование";

  closeInfo();
  centerWithOffset(p.lat,p.lng);
  openPanel();
}

/* DELETE */
function deletePoint(id){
  let arr=JSON.parse(localStorage.getItem("points")||"[]");
  arr=arr.filter(x=>x.id!==id);

  localStorage.setItem("points",JSON.stringify(arr));

  PointStore.sync();
  closeInfo();
  openMyPoints();
}

/* PANEL */
function openPanel(){
  panel.style.display="block";
  setPanel(0.33);
  panelOpen = true;

  if(current){
    coords.innerText=current.lat.toFixed(5)+", "+current.lng.toFixed(5);
  }
}

function closePanel(){
  panel.style.display="none";
  panelOpen = false;
  editMode=false;
  editId=null;
  title.innerText="📍 Новая точка";
}

function closeInfo(){
  infoPanel.style.display = "none";
  panelOpen = false;
  activePointId = null;
}

/* KEYBOARD FIX */
document.addEventListener("touchstart",e=>{
  if(!e.target.closest("textarea")){
    document.activeElement.blur();
  }
});

desc.onfocus=()=> setPanel(0.9);

init();

</script>
</body>
</html>
