<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UhaMap</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body { margin:0; font-family:Arial; }
#map { height:100vh; }

.menu {
  position:fixed;
  top:10px;
  left:10px;
  z-index:9999;
}

.menu button {
  background:#2a9d8f;
  color:#fff;
  border:none;
  padding:10px;
  border-radius:10px;
}

.panel {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  padding:15px;
  border-radius:15px 15px 0 0;
  display:none;
  z-index:9999;
  max-height:70vh;
  overflow:auto;
}

.row { margin-bottom:10px; }

select, textarea, input {
  width:100%;
  padding:10px;
}

button {
  width:100%;
  padding:12px;
  margin-top:5px;
}

.point-item {
  border-bottom:1px solid #eee;
  padding:10px;
}

.preview img{
  width:60px;
  height:60px;
  object-fit:cover;
  margin:3px;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="menu">
  <button onclick="openMyPoints()">📂 Мои точки</button>
</div>

<div class="panel" id="panel">
  <h3>📍 Точка</h3>
  <div id="coords"></div>

  <div class="row">
    <select id="category"></select>
  </div>

  <div class="row">
    <select id="access">
      <option>легковой</option>
      <option>внедорожник</option>
      <option>пешком</option>
      <option>лодка</option>
    </select>
  </div>

  <div class="row">
    <select id="connection">
      <option>нет связи</option>
      <option>слабая</option>
      <option>нормальная</option>
      <option>отличная</option>
    </select>
  </div>

  <div class="row">
    <textarea id="desc" placeholder="Описание"></textarea>
  </div>

  <div class="row">
    <input type="file" id="photo" accept="image/*" capture="environment" multiple>
    <div class="preview" id="preview"></div>
  </div>

  <button onclick="saveDraft()">Сохранить</button>
  <button onclick="publishPoint()">Опубликовать</button>
  <button onclick="closePanel()">Закрыть</button>
</div>

<div class="panel" id="myPointsPanel"></div>

<script>

const tg = window.Telegram.WebApp;
tg.expand();

const API = "YOUR_API_URL";

let map;
let current = null;
let tempMarker = null;
let editingId = null;

// ================= КАТЕГОРИИ =================
const categories = [
"рыбалка","платная рыбалка","кемпинг","лагерь","палатка","база отдыха",
"пляж","платный пляж","место для купания","спуск катера","пирс",
"опасный участок дороги","зимний проезд",
"родник","колодец","арт-объект","достопримечательность","загадочное место","дикое место",
"пожарная часть","медпомощь","туалет","мусорный бак"
];

// ================= ИКОНКИ =================
function getIcon(cat){
  const icons = {
    "рыбалка":"🎣","платная рыбалка":"💰🎣","кемпинг":"⛺","лагерь":"🏕️",
    "палатка":"⛺","база отдыха":"🏡","пляж":"🏖️","платный пляж":"💰🏖️",
    "место для купания":"🌊","спуск катера":"🚤","пирс":"🌉",
    "опасный участок дороги":"⚠️","зимний проезд":"❄️",
    "родник":"💧","колодец":"🪣","арт-объект":"🎨",
    "достопримечательность":"🏛️","загадочное место":"❓","дикое место":"🌲",
    "пожарная часть":"🚒","медпомощь":"🏥","туалет":"🚻","мусорный бак":"🗑️"
  };

  return L.divIcon({
    html:`<div style="font-size:20px">${icons[cat] || "📍"}</div>`,
    className:""
  });
}

// ================= INIT =================
function init(){

  map = L.map('map').setView([55,37],10);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  navigator.geolocation.getCurrentPosition(pos=>{
    map.setView([pos.coords.latitude,pos.coords.longitude],13);
  });

  map.on("click", e=>{
    current = e.latlng;

    if(tempMarker) map.removeLayer(tempMarker);

    tempMarker = L.marker(current).addTo(map);

    openPanel();
  });

  fillCategories();
  loadPoints();
  loadLocalPoints();

  document.getElementById("photo").onchange = previewPhotos;
}

// ================= PREVIEW =================
function previewPhotos(e){
  const box = document.getElementById("preview");
  box.innerHTML="";
  [...e.target.files].slice(0,5).forEach(f=>{
    const img = document.createElement("img");
    img.src = URL.createObjectURL(f);
    box.appendChild(img);
  });
}

// ================= STORAGE =================
function getLocal(){
  return JSON.parse(localStorage.getItem("points") || "[]");
}

function saveLocal(points){
  localStorage.setItem("points", JSON.stringify(points));
}

// ================= SAVE =================
function saveDraft(){

  if(!current) return;

  let points = getLocal();

  const photos = [...document.getElementById("photo").files]
    .slice(0,5)
    .map(f=>URL.createObjectURL(f));

  if(editingId){
    points = points.map(p=>{
      if(p.id === editingId){
        p.category = category.value;
        p.description = desc.value;
        p.photos = photos;
      }
      return p;
    });
  } else {
    points.push({
      id: Date.now(),
      lat: current.lat,
      lng: current.lng,
      category: category.value,
      description: desc.value,
      photos,
      status: "draft",
      visible: true
    });
  }

  saveLocal(points);
  reloadMap();

  editingId = null;
  closePanel();
}

// ================= PUBLISH =================
async function publishPoint(){

  if(!navigator.geolocation){
    alert("Нужна геолокация");
    return;
  }

  if(!document.getElementById("photo").files.length){
    alert("Добавь фото");
    return;
  }

  const data = {
    lat: current.lat,
    lng: current.lng,
    category: category.value,
    description: desc.value,
    user_id: tg.initDataUnsafe?.user?.id,
    user_name: tg.initDataUnsafe?.user?.first_name
  };

  await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({action:"savePoint",data})
  });

  alert("На модерации");
  closePanel();
}

// ================= LOAD =================
async function loadPoints(){

  const res = await fetch(API+"?action=getPoints");
  const data = await res.json();

  data.forEach(p=>{
    if(p.status !== "approved") return;

    L.marker([p.lat,p.lng],{icon:getIcon(p.category)})
      .addTo(map);
  });
}

// ================= LOCAL =================
function loadLocalPoints(){
  getLocal().forEach(drawPoint);
}

function drawPoint(p){
  if(!p.visible) return;

  L.marker([p.lat,p.lng],{icon:getIcon(p.category)})
    .addTo(map)
    .bindPopup(p.category);
}

// ================= MENU =================
function openMyPoints(){

  const panel = document.getElementById("myPointsPanel");
  panel.style.display="block";

  const points = getLocal();

  panel.innerHTML = "<h3>Мои точки</h3>";

  points.forEach(p=>{

    const div = document.createElement("div");
    div.className="point-item";

    div.innerHTML = `
      <b>${p.category}</b><br>
      ${p.status}<br>
      <button onclick="editPoint(${p.id})">Редактировать</button>
      <button onclick="toggle(${p.id})">Показать/скрыть</button>
      <button onclick="removePoint(${p.id})">Удалить</button>
      <button onclick="sendFromMenu(${p.id})">На модерацию</button>
    `;

    panel.appendChild(div);
  });
}

// ================= ACTIONS =================
function editPoint(id){
  const p = getLocal().find(x=>x.id===id);
  if(!p) return;

  editingId = id;
  current = {lat:p.lat,lng:p.lng};

  openPanel();

  category.value = p.category;
  desc.value = p.description;
}

function sendFromMenu(id){
  const p = getLocal().find(x=>x.id===id);
  if(!p) return;

  current = {lat:p.lat,lng:p.lng};
  publishPoint();
}

function toggle(id){
  let points = getLocal();
  points = points.map(p=>{
    if(p.id===id) p.visible=!p.visible;
    return p;
  });
  saveLocal(points);
  reloadMap();
}

function removePoint(id){
  saveLocal(getLocal().filter(p=>p.id!==id));
  reloadMap();
}

// ================= UTILS =================
function reloadMap(){
  location.reload();
}

// ================= PANEL =================
function openPanel(){
  document.getElementById("panel").style.display="block";
  coords.innerText = current.lat.toFixed(5)+", "+current.lng.toFixed(5);
}

function closePanel(){
  document.getElementById("panel").style.display="none";
}

// ================= START =================
init();

</script>
</body>
</html>
