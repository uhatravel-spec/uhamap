<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UhaMap</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body { margin:0; font-family:Arial; }
#map { height:100vh; }

.menu {
  position:fixed;
  top:10px;
  left:10px;
  z-index:9999;
}

.menu button {
  background:#2a9d8f;
  color:#fff;
  border:none;
  padding:10px;
  border-radius:10px;
  margin-bottom:5px;
}

.panel {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  padding:15px;
  border-radius:20px 20px 0 0;
  display:none;
  z-index:9999;
  height:33vh;
  max-height:90vh;
  overflow:auto;
  box-shadow:0 -5px 20px rgba(0,0,0,0.2);
  transition:height 0.2s ease;
}

.row { margin-bottom:10px; }

select, textarea, button {
  width:100%;
  padding:10px;
}

.photos img {
  width:70px;
  height:70px;
  object-fit:cover;
  margin:5px;
  border-radius:8px;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="menu">
  <button onclick="openMyPoints()">📂 Мои точки</button>
</div>

<div class="panel" id="panel">
  <div id="toggleBtn" style="text-align:center;font-size:24px;cursor:pointer;">—</div>

  <h3 id="panelTitle">📍 Новая точка</h3>
  <div id="coords"></div>

  <div class="row">
    <select id="category"></select>
  </div>

  <div class="row">
    <select id="access">
      <option>легковой</option>
      <option>внедорожник</option>
      <option>пешком</option>
      <option>лодка</option>
    </select>
  </div>

  <div class="row">
    <textarea id="desc" placeholder="Описание"></textarea>
  </div>

  <button onclick="requestCamera()">📸 Сделать фото</button>
  <input type="file" id="camera" accept="image/*" capture="environment" hidden>

  <div class="photos" id="photos"></div>

  <button onclick="saveDraft()">Сохранить (локально)</button>
  <button onclick="publish()">Опубликовать</button>
  <button onclick="closePanel()">Закрыть</button>
</div>

<div class="panel" id="myPanel"></div>

<script>

const tg = window.Telegram.WebApp;
tg.expand();

const API = "YOUR_API_URL";

let map;
let current = null;
let tempMarker = null;
let userMarker = null;
let photos = [];

let editMode = false;
let editId = null;

// PANEL STATE
const panelEl = document.getElementById("panel");
const STATES = [0.33, 0.66, 0.9];
let stateIndex = 0;

// ====== СМЕЩЕНИЕ КАРТЫ (ГЛАВНОЕ) ======
function setMapFocus(lat, lng){
  const yOffset = window.innerHeight / 6;

  const point = map.project([lat, lng], map.getZoom());
  const newPoint = L.point(point.x, point.y - yOffset);

  const newLatLng = map.unproject(newPoint, map.getZoom());

  map.setView(newLatLng, 15, {animate:true});
}

// ================= ICONS =================
const icons = {
  "рыбалка":"🎣",
  "платная рыбалка":"💰🎣",
  "кемпинг":"⛺",
  "пляж":"🏖️",
  "опасно":"⚠️",
  "родник":"💧",
  "пирс":"🌉"
};

function icon(cat){
  return L.divIcon({
    html:`<div style="font-size:22px">${icons[cat] || "📍"}</div>`,
    className:""
  });
}

// ================= INIT =================
function init(){

  map = L.map('map').setView([55,37],10);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  map.locate({setView:true, watch:true});

  map.on("locationfound", e=>{
    if(userMarker) map.removeLayer(userMarker);

    userMarker = L.circleMarker(e.latlng,{
      radius:8,
      color:"blue",
      fillColor:"blue",
      fillOpacity:1
    }).addTo(map).bindPopup("Вы здесь");
  });

  map.on("click", e=>{
    current = e.latlng;

    if(tempMarker) map.removeLayer(tempMarker);

    tempMarker = L.marker(current,{icon: icon("рыбалка")}).addTo(map);

    openPanel();
  });

  fillCategories();
  loadPoints();

  setTimeout(()=>{
    PointStore.sync();
  },500);
}

// ================= PANEL =================
function setPanel(h){
  panelEl.style.height = (window.innerHeight * h) + "px";
}

function openPanel(){
  panelEl.style.display="block";
  setPanel(0.33);

  if(current){
    coords.innerText = current.lat.toFixed(5)+", "+current.lng.toFixed(5);
  }
}

function closePanel(){
  panelEl.style.display="none";
  editMode = false;
  editId = null;
}

// toggle
document.getElementById("toggleBtn").onclick = ()=>{
  stateIndex = (stateIndex + 1) % STATES.length;
  setPanel(STATES[stateIndex]);
};

// ================= CATEGORY =================
function fillCategories(){
  const sel = document.getElementById("category");
  sel.innerHTML = "";

  Object.keys(icons).forEach(c=>{
    let o = document.createElement("option");
    o.value = c;
    o.innerHTML = `${icons[c]} ${c}`;
    sel.appendChild(o);
  });
}

// ================= PHOTO =================
function requestCamera(){
  document.getElementById("camera").click();
}

document.getElementById("camera").addEventListener("change", e=>{
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = ev=>{
    photos.push(ev.target.result);
    renderPhotos();
  };
  reader.readAsDataURL(file);
});

function renderPhotos(){
  const box = document.getElementById("photos");
  box.innerHTML = "";

  photos.forEach((p,i)=>{
    let img = document.createElement("img");
    img.src = p;

    img.onclick = ()=>{
      photos.splice(i,1);
      renderPhotos();
    };

    box.appendChild(img);
  });
}

// ================= SAVE =================
function saveDraft(){
  let arr = JSON.parse(localStorage.getItem("points") || "[]");

  if(editMode){
    arr = arr.map(p=>{
      if(p.id === editId){
        return {...p,
          category:category.value,
          access:access.value,
          desc:desc.value,
          photos
        };
      }
      return p;
    });
  } else {
    arr.push({
      id:Date.now(),
      lat:current.lat,
      lng:current.lng,
      category:category.value,
      access:access.value,
      desc:desc.value,
      photos,
      status:"draft"
    });
  }

  localStorage.setItem("points", JSON.stringify(arr));
  PointStore.sync();
  closePanel();
}

// ================= MY POINTS =================
function openMyPoints(){

  const box = document.getElementById("myPanel");
  box.style.display = "block";
  box.innerHTML = "<h3>📂 Мои точки</h3>";

  const arr = JSON.parse(localStorage.getItem("points") || "[]");

  arr.forEach(p=>{
    const div = document.createElement("div");

    div.innerHTML = `
      <hr>
      <b>${p.category}</b><br>
      ${p.desc || ""}<br>

      <button onclick="focusPoint(${p.lat},${p.lng})">📍 Показать</button>
      <button onclick="editPoint(${p.id})">✏️ Изменить</button>
      <button onclick="deletePoint(${p.id})">🗑 Удалить</button>
    `;

    box.appendChild(div);
  });
}

function focusPoint(lat,lng){
  setMapFocus(lat,lng);
}

// ================= EDIT =================
function editPoint(id){
  const arr = JSON.parse(localStorage.getItem("points") || "[]");
  const p = arr.find(x=>x.id === id);

  if(!p) return;

  editMode = true;
  editId = id;

  current = {lat:p.lat,lng:p.lng};

  category.value = p.category;
  access.value = p.access;
  desc.value = p.desc;

  photos = p.photos || [];
  renderPhotos();

  setMapFocus(p.lat,p.lng);
  openPanel();
}

function deletePoint(id){
  let arr = JSON.parse(localStorage.getItem("points") || "[]");
  arr = arr.filter(x=>x.id !== id);

  localStorage.setItem("points", JSON.stringify(arr));
  PointStore.sync();
  openMyPoints();
}

// ================= STORE =================
const PointStore = {
  sync(){
    const points = JSON.parse(localStorage.getItem("points") || "[]");

    if(window.layer){
      window.layer.clearLayers();
    } else {
      window.layer = L.layerGroup().addTo(map);
    }

    points.forEach(p=>{
      const m = L.marker([p.lat,p.lng],{icon: icon(p.category)});

      m.on("click", ()=>{
        current = {lat:p.lat,lng:p.lng};

        category.value = p.category;
        access.value = p.access;
        desc.value = p.desc || "";

        photos = p.photos || [];
        renderPhotos();

        setMapFocus(p.lat,p.lng);
        openPanel();
      });

      window.layer.addLayer(m);
    });
  }
};

init();

</script>
</body>
</html>
