<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UhaMap</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body { margin:0; font-family:Arial; }
#map { height:100vh; }

.menu { position:fixed; top:10px; left:10px; z-index:9999; }
.menu button {
  background:#2a9d8f; color:#fff;
  border:none; padding:10px; border-radius:10px;
}

.panel {
  position:fixed;
  bottom:0; left:0; right:0;
  background:#fff;
  padding:15px;
  border-radius:20px 20px 0 0;
  display:none;
  z-index:9999;
  height:33vh;
  overflow:auto;
  box-shadow:0 -5px 20px rgba(0,0,0,0.2);
}

.selected-marker {
  transform: scale(1.5);
}
</style>
</head>

<body>

<div id="map"></div>

<div class="menu">
  <button onclick="UI.openMyPoints()">📂 Мои точки</button>
</div>

<div class="panel" id="panel"></div>
<div class="panel" id="infoPanel"></div>
<div class="panel" id="myPanel"></div>

<script>

/* ================= STATE ================= */
const State = {
  current:null,
  editId:null,
  editMode:false,
  activeMarker:null,
  photos:[]
};

/* ================= MAP ================= */
const Map = {

  init(){
    this.map = L.map('map').setView([55,37],10);

    const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
    const sat = L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',
      {subdomains:['mt0','mt1','mt2','mt3']});

    osm.addTo(this.map);

    L.control.layers({ "Обычная":osm, "Спутник":sat }).addTo(this.map);

    this.map.locate({setView:true});

    this.map.on("locationfound", e=>{
      this.user(e.latlng);
    });

    this.map.on("click", e=>{
      State.current = e.latlng;
      UI.openPanel();
    });

    Points.load();
  },

  user(latlng){
    if(this.userMarker) this.map.removeLayer(this.userMarker);

    this.userMarker = L.circleMarker(latlng,{
      radius:8,color:"blue"
    }).addTo(this.map);
  },

  center(lat,lng){
    const zoom = this.map.getZoom();
    const offset = window.innerHeight / 6;

    const p = this.map.project([lat,lng], zoom).subtract([0,offset]);
    this.map.setView(this.map.unproject(p,zoom), zoom);
  }
};

/* ================= UI ================= */
const UI = {

  openPanel(){
    panel.style.display="block";
  },

  openInfo(p){
    infoPanel.style.display="block";
    infoPanel.innerHTML = `
      <b>${p.category}</b><br>
      ${p.desc}<br>
      ${(p.photos||[]).map(x=>`<img src="${x}" width="60">`).join("")}
      <button onclick="Points.edit(${p.id})">Изменить</button>
    `;
  },

  openMyPoints(){
    myPanel.style.display="block";

    const arr = Points.get();

    myPanel.innerHTML = arr.map(p=>`
      <div>
        ${p.category}<br>
        <button onclick="Points.focus(${p.id})">Показать</button>
        <button onclick="Points.edit(${p.id})">Изменить</button>
        <button onclick="Points.remove(${p.id})">Удалить</button>
      </div>
    `).join("");
  }
};

/* ================= POINTS ================= */
const Points = {

  get(){
    return JSON.parse(localStorage.getItem("points")||"[]");
  },

  save(){

    let arr = this.get();

    if(State.editMode){
      arr = arr.map(p=>{
        if(p.id===State.editId){
          return {
            ...p,
            category:category.value,
            access:access.value,
            desc:desc.value,
            photos:State.photos
          };
        }
        return p;
      });
    } else {
      arr.push({
        id:Date.now(),
        lat:State.current.lat,
        lng:State.current.lng,
        category:category.value,
        access:access.value,
        desc:desc.value,
        photos:State.photos
      });
    }

    localStorage.setItem("points",JSON.stringify(arr));
    this.load();
  },

  load(){

    if(Map.layer) Map.layer.clearLayers();
    else Map.layer = L.layerGroup().addTo(Map.map);

    this.get().forEach(p=>{
      const m = L.marker([p.lat,p.lng]);

      m.on("click",()=>{
        if(State.activeMarker)
          State.activeMarker.getElement()?.classList.remove("selected-marker");

        State.activeMarker = m;

        setTimeout(()=>{
          m.getElement()?.classList.add("selected-marker");
        });

        Map.center(p.lat,p.lng);
        UI.openInfo(p);
      });

      Map.layer.addLayer(m);
    });
  },

  focus(id){
    const p = this.get().find(x=>x.id===id);
    Map.center(p.lat,p.lng);
  },

  edit(id){
    const p = this.get().find(x=>x.id===id);

    State.editMode = true;
    State.editId = id;

    State.current = {lat:p.lat,lng:p.lng};
    State.photos = p.photos||[];

    category.value = p.category;
    access.value = p.access;
    desc.value = p.desc;

    UI.openPanel();
    UI.openInfo(p);
  },

  remove(id){
    let arr = this.get().filter(x=>x.id!==id);
    localStorage.setItem("points",JSON.stringify(arr));
    this.load();
  }
};

/* ================= INIT ================= */
Map.init();

</script>
</body>
</html>
