<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>UhaMap</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{height:100vh;display:flex;flex-direction:column;font-family:Arial}
#map{flex:1}

.panel{
 position:fixed;
 bottom:0;
 width:100%;
 background:#fff;
 padding:12px;
 border-radius:16px 16px 0 0;
 display:none;
}

select,textarea{
width:100%;
padding:10px;
margin-bottom:8px;
border-radius:10px
}

button{
width:100%;
padding:12px;
border:none;
border-radius:20px;
background:#2a9d8f;
color:#fff
}

.loading{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#000;
color:#fff;
padding:6px 14px;
border-radius:20px;
display:none
}
</style>
</head>

<body>

<div id="map"></div>
<div class="loading" id="loading">Загрузка...</div>

<div class="panel" id="panel">
    <h3>📍 Новая точка</h3>

    <select id="category"></select>
    <textarea id="desc" placeholder="Описание"></textarea>

    <button onclick="savePoint()">Сохранить</button>
    <button onclick="closePanel()" style="background:#ccc;margin-top:6px">Отмена</button>
</div>

<script>

const tg = window.Telegram.WebApp;
tg.expand();

const API = "https://script.google.com/macros/s/AKfycbwlOgngZosEiq_7uHYbicL5EtwC88V0IcXiyUCCQGGddxBTXf4iVWGrMbArTIwquWHb/exec";

let map;
let current = null;

// ================= КАТЕГОРИИ =================
const categories = [
"рыбалка","платная рыбалка","мосток","платный мосток",
"агроусадьба","загадочное место","артобъект",
"опасная дорога","пляж","платный пляж",
"купание","спуск катера",
"кемпинг","лагерь","палатка",
"пожарная","медпомощь",
"беседка","платная беседка",
"достопримечательность",
"парковка","платная парковка",
"пирс","санаторий",
"родник","колодец",
"мусор","туалет",
"база отдыха","кострище","дикое место",
"зимний проезд","остров (2WD/4x4/пешком)"
];

// ================= ИКОНКИ =================
const iconMap = {
 "рыбалка":"🎣",
 "платная рыбалка":"💰🎣",
 "пляж":"🏖️",
 "платный пляж":"💰🏖️",
 "кемпинг":"⛺",
 "палатка":"🏕️",
 "опасная дорога":"⚠️",
 "родник":"💧",
 "парковка":"🅿️",
 "пирс":"🌉",
 "беседка":"🪑",
 "медпомощь":"🚑",
 "пожарная":"🚒"
};

// ================= СЛОИ =================
const osm = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png');
const sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');
const labels = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png');
const hybrid = L.layerGroup([sat,labels]);

function initMap(){

map = L.map('map',{center:[55.75,37.61],zoom:11,layers:[osm]});

L.control.layers({
"Карта":osm,
"Спутник":sat,
"Гибрид":hybrid
}).addTo(map);

map.on('click',e=>{
current=e.latlng;
openPanel();
});

loadPoints();
fillSelect();
}

// ================= SELECT =================
function fillSelect(){
let s=document.getElementById("category");
categories.forEach(c=>{
let o=document.createElement("option");
o.value=c;
o.text=c;
s.appendChild(o);
});
}

// ================= LOAD =================
async function loadPoints(){

const res=await fetch(API+"?action=getPoints");
const data=await res.json();

data.forEach(p=>{
const icon = iconMap[p.category] || "📍";

L.marker([p.lat,p.lng])
.addTo(map)
.bindPopup(`
${icon} <b>${p.category}</b><br>
📝 ${p.description || ""}
`);
});
}

// ================= PANEL =================
function openPanel(){
document.getElementById("panel").style.display="block";
}

function closePanel(){
document.getElementById("panel").style.display="none";
current=null;
}

// ================= SAVE =================
async function savePoint(){

if(!current)return;

const data={
lat:current.lat,
lng:current.lng,
category:document.getElementById("category").value,
description:document.getElementById("desc").value,
user_id:tg.initDataUnsafe?.user?.id
};

document.getElementById("loading").style.display="block";

await fetch(API,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({action:"savePoint",data})
});

L.marker([data.lat,data.lng])
.addTo(map)
.bindPopup(iconMap[data.category]||"📍");

document.getElementById("loading").style.display="none";
closePanel();
}

initMap();

</script>

</body>
</html>
