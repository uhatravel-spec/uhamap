<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UhaMap</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body { margin:0; font-family:Arial; }
#map { height:100vh; }

.menu {
  position:fixed;
  top:10px;
  left:10px;
  z-index:9999;
}

.menu button {
  background:#2a9d8f;
  color:#fff;
  border:none;
  padding:10px;
  border-radius:10px;
}

.panel {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  padding:15px;
  border-radius:15px 15px 0 0;
  display:none;
  z-index:9999;
  max-height:75vh;
  overflow:auto;
}

.row { margin-bottom:10px; }
select, textarea { width:100%; padding:10px; }

button {
  width:100%;
  padding:12px;
  margin-top:5px;
}

.point-item {
  border-bottom:1px solid #eee;
  padding:10px;
}

.photos img {
  width:70px;
  height:70px;
  object-fit:cover;
  margin:5px;
  border-radius:8px;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="menu">
  <button onclick="openMyPoints()">📂 Мои точки</button>
</div>

<!-- ФОРМА -->
<div class="panel" id="panel">

  <h3>📍 Новая точка</h3>
  <div id="coords"></div>

  <div class="row">
    <select id="category"></select>
  </div>

  <div class="row">
    <select id="access">
      <option value="легковой">Легковой</option>
      <option value="внедорожник">Внедорожник</option>
      <option value="пешком">Пешком</option>
      <option value="лодка">Лодка</option>
    </select>
  </div>

  <div class="row">
    <textarea id="desc" placeholder="Описание"></textarea>
  </div>

  <!-- 📸 ФОТО -->
  <button onclick="takePhoto()">📸 Сделать фото</button>
  <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">
  <div class="photos" id="photos"></div>

  <button onclick="saveDraft()">Сохранить</button>
  <button onclick="publishPoint()">Опубликовать</button>
  <button onclick="closePanel()">Закрыть</button>

</div>

<div class="panel" id="myPointsPanel"></div>

<script>

const tg = window.Telegram.WebApp;
tg.expand();

const API = "YOUR_API_URL";

let map;
let current = null;
let tempMarker = null;
let userMarker = null;
let photos = [];

// ================= КАТЕГОРИИ =================
const categories = [
"рыбалка","платная рыбалка","кемпинг","лагерь","палатка","база отдыха",
"пляж","платный пляж","место для купания","спуск катера","пирс",
"опасный участок дороги","зимний проезд",
"родник","колодец","арт-объект","достопримечательность","загадочное место","дикое место",
"пожарная часть","медпомощь","туалет","мусорный бак"
];

// ================= ИКОНКИ =================
const iconMap = {
"рыбалка":"🎣","платная рыбалка":"💰🎣","кемпинг":"⛺","лагерь":"🏕️",
"палатка":"⛺","база отдыха":"🏡","пляж":"🏖️","платный пляж":"💰🏖️",
"место для купания":"🌊","спуск катера":"🚤","пирс":"🌉",
"опасный участок дороги":"⚠️","зимний проезд":"❄️",
"родник":"💧","колодец":"🪣","арт-объект":"🎨","достопримечательность":"🏛️",
"загадочное место":"❓","дикое место":"🌲",
"пожарная часть":"🚒","медпомощь":"🏥","туалет":"🚻","мусорный бак":"🗑️"
};

function getIcon(cat){
  return L.divIcon({
    html:`<div style="font-size:20px">${iconMap[cat] || "📍"}</div>`,
    className:""
  });
}

// ================= INIT =================
function init(){

  map = L.map('map').setView([55,37],10);

  const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  const sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');

  L.control.layers({"Карта": osm,"Спутник": sat}).addTo(map);

  // 📍 геолокация пользователя
  map.locate({setView:true});

  map.on("locationfound", e=>{
    if(userMarker) map.removeLayer(userMarker);

    userMarker = L.circleMarker(e.latlng,{
      radius:8,
      color:"#007bff"
    }).addTo(map).bindPopup("Вы здесь");
  });

  map.on("click", e=>{
    current = e.latlng;

    if(tempMarker) map.removeLayer(tempMarker);

    tempMarker = L.marker(current).addTo(map);

    openPanel();
  });

  fillCategories();
  loadPoints();
  loadLocalPoints();
}

// ================= CATEGORY =================
function fillCategories(){

  const sel = document.getElementById("category");
  sel.innerHTML = "";

  categories.forEach((c,i)=>{
    const opt = document.createElement("option");
    opt.value = c;
    opt.innerText = `${iconMap[c] || "📍"} ${c}`;
    if(i===0) opt.selected = true;
    sel.appendChild(opt);
  });

  sel.addEventListener("change", ()=>{
    if(!current) return;

    if(tempMarker) map.removeLayer(tempMarker);

    tempMarker = L.marker(current,{
      icon:getIcon(sel.value)
    }).addTo(map);
  });
}

// ================= ФОТО =================
function takePhoto(){

  alert("Фото только с включенной геолокацией");

  navigator.geolocation.getCurrentPosition(()=>{
    document.getElementById("cameraInput").click();
  });
}

document.getElementById("cameraInput").onchange = function(e){

  const file = e.target.files[0];
  if(!file) return;

  if(photos.length >= 5){
    alert("Максимум 5 фото");
    return;
  }

  const reader = new FileReader();

  reader.onload = function(ev){
    photos.push(ev.target.result);
    renderPhotos();
  };

  reader.readAsDataURL(file);
};

function renderPhotos(){
  const box = document.getElementById("photos");
  box.innerHTML = "";

  photos.forEach((p,i)=>{
    const img = document.createElement("img");
    img.src = p;

    img.onclick = ()=>{
      photos.splice(i,1);
      renderPhotos();
    };

    box.appendChild(img);
  });
}

// ================= LOCAL =================
function getLocal(){
  return JSON.parse(localStorage.getItem("points") || "[]");
}

function saveLocal(points){
  localStorage.setItem("points", JSON.stringify(points));
}

// ================= SAVE =================
function saveDraft(){

  if(!current) return;

  const points = getLocal();

  const p = {
    id: Date.now(),
    lat: current.lat,
    lng: current.lng,
    category: document.getElementById("category").value,
    description: document.getElementById("desc").value,
    photos,
    status:"draft",
    visible:true
  };

  points.push(p);
  saveLocal(points);

  drawPoint(p);

  closePanel();
}

// ================= PUBLISH =================
async function publishPoint(){

  if(photos.length === 0){
    alert("Добавь фото");
    return;
  }

  const data = {
    lat: current.lat,
    lng: current.lng,
    category: document.getElementById("category").value,
    description: document.getElementById("desc").value,
    photos,
    user_id: tg.initDataUnsafe?.user?.id,
    user_name: tg.initDataUnsafe?.user?.first_name
  };

  await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({action:"savePoint",data})
  });

  alert("Отправлено на модерацию");
  closePanel();
}

// ================= LOAD =================
async function loadPoints(){

  const res = await fetch(API+"?action=getPoints");
  const data = await res.json();

  data.forEach(p=>{
    if(p.status !== "approved") return;

    L.marker([p.lat,p.lng],{
      icon:getIcon(p.category)
    }).addTo(map);
  });
}

// ================= LOCAL =================
function loadLocalPoints(){
  getLocal().forEach(drawPoint);
}

function drawPoint(p){

  if(!p.visible) return;

  L.marker([p.lat,p.lng],{
    icon:getIcon(p.category)
  }).addTo(map)
    .bindPopup(`${p.category}<br>${p.description}<br>${p.status}`);
}

// ================= MY POINTS =================
function openMyPoints(){

  const panel = document.getElementById("myPointsPanel");
  panel.style.display="block";

  const points = getLocal();

  panel.innerHTML = "<h3>Мои точки</h3>";

  points.forEach(p=>{
    const div = document.createElement("div");
    div.className="point-item";

    div.innerHTML = `
      <b>${p.category}</b><br>
      ${p.status}<br>
      <button onclick="toggle(${p.id})">Показать / скрыть</button>
      <button onclick="removePoint(${p.id})">Удалить</button>
    `;

    panel.appendChild(div);
  });
}

// ================= ACTIONS =================
function toggle(id){
  let points = getLocal();
  points = points.map(p=>{
    if(p.id===id) p.visible=!p.visible;
    return p;
  });
  saveLocal(points);
  location.reload();
}

function removePoint(id){
  let points = getLocal().filter(p=>p.id!==id);
  saveLocal(points);
  location.reload();
}

// ================= PANEL =================
function openPanel(){
  document.getElementById("panel").style.display="block";
  document.getElementById("coords").innerText =
    current.lat.toFixed(5)+", "+current.lng.toFixed(5);

  photos = [];
  renderPhotos();
}

function closePanel(){
  document.getElementById("panel").style.display="none";
}

// ================= START =================
init();

</script>

</body>
</html>
