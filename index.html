<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UhaMap</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body { margin:0; font-family:Arial; }
#map { height:100vh; }

.panel {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  padding:12px;
  border-radius:15px 15px 0 0;
  display:none;
  z-index:9999;
  max-height:70vh;
  overflow:auto;
}

.row { margin-bottom:10px; }
select, textarea, input {
  width:100%;
  padding:10px;
}
button {
  width:100%;
  padding:12px;
  margin-top:5px;
}
.admin {
  position:fixed;
  right:0;
  top:0;
  width:300px;
  height:100%;
  background:#fff;
  overflow:auto;
  display:none;
  z-index:9999;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="panel" id="panel">

  <h3>Новая точка</h3>

  <div id="coords"></div>

  <div class="row">
    <select id="category"></select>
  </div>

  <div class="row">
    <select id="access">
      <option>легковой</option>
      <option>внедорожник</option>
      <option>пешком</option>
      <option>лодка</option>
    </select>
  </div>

  <div class="row">
    <textarea id="desc" placeholder="описание"></textarea>
  </div>

  <button onclick="save()">Сохранить</button>
  <button onclick="closePanel()">Закрыть</button>

</div>

<div class="admin" id="admin"></div>

<script>

const tg = window.Telegram.WebApp;
tg.expand();

const API = "YOUR_API_URL";

let map;
let current;

// ================= ПОЛНЫЙ СПИСОК КАТЕГОРИЙ =================
const categories = [
  "рыбалка",
  "платная рыбалка",
  "кемпинг",
  "лагерь",
  "палатка",
  "база отдыха",

  "пляж",
  "платный пляж",
  "место для купания",
  "спуск катера",
  "пирс",

  "опасный участок дороги",
  "зимний проезд",

  "родник",
  "колодец",
  "арт-объект",
  "достопримечательность",
  "загадочное место",
  "дикое место",

  "пожарная часть",
  "медпомощь",
  "туалет",
  "мусорный бак"
];

// ================= ИКОНКИ =================
function icon(cat) {

  const mapIcon = {
    "рыбалка":"🎣",
    "платная рыбалка":"💰🎣",
    "кемпинг":"⛺",
    "лагерь":"🏕️",
    "палатка":"⛺",
    "база отдыха":"🏡",

    "пляж":"🏖️",
    "платный пляж":"💰🏖️",
    "место для купания":"🌊",
    "спуск катера":"🚤",
    "пирс":"🌉",

    "опасный участок дороги":"⚠️",
    "зимний проезд":"❄️",

    "родник":"💧",
    "колодец":"🪣",
    "арт-объект":"🎨",
    "достопримечательность":"🏛️",
    "загадочное место":"❓",
    "дикое место":"🌲",

    "пожарная часть":"🚒",
    "медпомощь":"🏥",
    "туалет":"🚻",
    "мусорный бак":"🗑️"
  };

  return L.divIcon({
    html:`<div style="font-size:20px">${mapIcon[cat] || "📍"}</div>`,
    className:""
  });
}

// ================= INIT =================
function init() {

  map = L.map('map').setView([55,37],10);

  const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  const sat = L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
  );

  L.control.layers({
    "OSM": osm,
    "Satellite": sat
  }).addTo(map);

  map.on("click", e => {
    current = e.latlng;
    openPanel();
  });

  fillCategories();
  loadPoints();
  loadAdmin();
}

// ================= CATEGORY UI =================
function fillCategories() {
  const sel = document.getElementById("category");
  categories.forEach(c => {
    const opt = document.createElement("option");
    opt.value = c;
    opt.innerText = c;
    sel.appendChild(opt);
  });
}

// ================= POINTS =================
async function loadPoints() {

  const res = await fetch(API + "?action=getPoints");
  const data = await res.json();

  data.forEach(p => {
    L.marker([p.lat, p.lng], { icon: icon(p.category) })
      .addTo(map)
      .bindPopup(p.category);
  });
}

// ================= SAVE =================
async function save() {

  await fetch(API, {
    method:"POST",
    body:JSON.stringify({
      action:"savePoint",
      data:{
        lat: current.lat,
        lng: current.lng,
        category: document.getElementById("category").value,
        access: document.getElementById("access").value,
        description: document.getElementById("desc").value,
        user_id: tg.initDataUnsafe?.user?.id,
        user_name: tg.initDataUnsafe?.user?.first_name
      }
    })
  });

  closePanel();
  alert("Отправлено на модерацию");
}

// ================= PANEL =================
function openPanel(){
  document.getElementById("panel").style.display="block";
  document.getElementById("coords").innerText =
    current.lat.toFixed(5)+", "+current.lng.toFixed(5);
}

function closePanel(){
  document.getElementById("panel").style.display="none";
}

// ================= ADMIN =================
async function loadAdmin(){

  const res = await fetch(API + "?action=getPending");
  const data = await res.json();

  const box = document.getElementById("admin");
  box.style.display = "block";

  box.innerHTML = "<h3>Модерация</h3>";

  data.forEach(p => {

    const div = document.createElement("div");
    div.innerHTML = `
      <b>${p.category}</b><br>
      ${p.user}<br>
      <button onclick="approve('${p.id}')">Approve</button>
    `;

    box.appendChild(div);
  });
}

function approve(id){
  fetch(API,{
    method:"POST",
    body:JSON.stringify({action:"approve",id})
  });
}

init();

</script>
</body>
</html>
