<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UhaMap</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body { margin:0; font-family:Arial; }
#map { height:100vh; }

.menu {
  position:fixed;
  top:10px;
  left:10px;
  z-index:9999;
}

.menu button {
  background:#2a9d8f;
  color:#fff;
  border:none;
  padding:10px;
  border-radius:10px;
  margin-bottom:5px;
}

.panel {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  padding:15px;
  border-radius:15px 15px 0 0;
  display:none;
  z-index:9999;
  max-height:75vh;
  overflow:auto;
}

.row { margin-bottom:10px; }

select, textarea, button {
  width:100%;
  padding:10px;
}

.photos img {
  width:70px;
  height:70px;
  object-fit:cover;
  margin:5px;
  border-radius:8px;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="menu">
  <button onclick="openMyPoints()">📂 Мои точки</button>
</div>

<div class="panel" id="panel">

  <h3>📍 Новая точка</h3>
  <div id="coords"></div>

  <div class="row">
    <select id="category"></select>
  </div>

  <div class="row">
    <select id="access">
      <option>легковой</option>
      <option>внедорожник</option>
      <option>пешком</option>
      <option>лодка</option>
    </select>
  </div>

  <div class="row">
    <textarea id="desc" placeholder="Описание"></textarea>
  </div>

  <button onclick="requestCamera()">📸 Сделать фото</button>
  <input type="file" id="camera" accept="image/*" capture="environment" hidden>

  <div class="photos" id="photos"></div>

  <button onclick="saveDraft()">Сохранить (локально)</button>
  <button onclick="publish()">Опубликовать</button>
  <button onclick="closePanel()">Закрыть</button>

</div>

<div class="panel" id="myPanel"></div>

<script>

const tg = window.Telegram.WebApp;
tg.expand();

const API = "YOUR_API_URL";

let map;
let current = null;
let tempMarker = null;
let userMarker = null;
let photos = [];

// ================= ICONS =================
const icons = {
  "рыбалка":"🎣",
  "платная рыбалка":"💰🎣",
  "кемпинг":"⛺",
  "пляж":"🏖️",
  "опасно":"⚠️",
  "родник":"💧",
  "пирс":"🌉"
};

function icon(cat){
  return L.divIcon({
    html:`<div style="font-size:22px">${icons[cat] || "📍"}</div>`,
    className:""
  });
}

// ================= INIT =================
function init(){

  map = L.map('map').setView([55,37],10);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  map.locate({setView:true, watch:true});

  map.on("locationfound", e=>{
    if(userMarker) map.removeLayer(userMarker);

    userMarker = L.circleMarker(e.latlng,{
      radius:8,
      color:"blue",
      fillColor:"blue",
      fillOpacity:1
    }).addTo(map).bindPopup("Вы здесь");
  });

  map.on("click", e=>{
    current = e.latlng;

    if(tempMarker) map.removeLayer(tempMarker);

    tempMarker = L.marker(current,{icon: icon("рыбалка")}).addTo(map);

    openPanel();
  });

  fillCategories();
  loadPoints();
}

// ================= CATEGORY =================
function fillCategories(){
  const sel = document.getElementById("category");
  sel.innerHTML = "";

  Object.keys(icons).forEach(c=>{
    let o = document.createElement("option");
    o.value = c;
    o.innerHTML = `${icons[c]} ${c}`;
    sel.appendChild(o);
  });

  sel.onchange = ()=>{
    if(tempMarker) map.removeLayer(tempMarker);
    tempMarker = L.marker(current,{icon: icon(sel.value)}).addTo(map);
  };
}

// ================= CAMERA =================
function requestCamera(){
  document.getElementById("camera").click();
}

document.getElementById("camera").addEventListener("change", e=>{
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = ev=>{
    photos.push(ev.target.result);
    renderPhotos();
  };

  reader.readAsDataURL(file);
});

function renderPhotos(){
  const box = document.getElementById("photos");
  box.innerHTML = "";

  photos.forEach((p,i)=>{
    let img = document.createElement("img");
    img.src = p;

    img.onclick = ()=>{
      photos.splice(i,1);
      renderPhotos();
    };

    box.appendChild(img);
  });
}

// ================= SAVE =================
function saveDraft(){
  const arr = JSON.parse(localStorage.getItem("points") || "[]");

  arr.push({
    id:Date.now(),
    lat:current.lat,
    lng:current.lng,
    category:document.getElementById("category").value,
    access:document.getElementById("access").value,
    desc:document.getElementById("desc").value,
    photos,
    status:"draft"
  });

  localStorage.setItem("points", JSON.stringify(arr));
  closePanel();
  alert("Сохранено локально");

  renderLocalPoints(); // ADD
}

// ================= PUBLISH =================
function publish(){
  fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      action:"savePoint",
      data:{
        lat:current.lat,
        lng:current.lng,
        category:document.getElementById("category").value,
        access:document.getElementById("access").value,
        description:document.getElementById("desc").value,
        photos,
        user_id:tg.initDataUnsafe?.user?.id,
        user_name:tg.initDataUnsafe?.user?.first_name
      }
    })
  });

  alert("Отправлено на модерацию");
  closePanel();
}

// ================= LOAD SERVER POINTS =================
async function loadPoints(){
  const res = await fetch(API+"?action=getPoints");
  const data = await res.json();

  data.forEach(p=>{
    L.marker([p.lat,p.lng],{
      icon: icon(p.category)
    }).addTo(map);
  });
}

/* =========================================================
   🧠 ADD SYSTEM LAYER (НЕ ТРОГАЕТ ТВОЙ КОД)
   ========================================================= */

// ================= LOCAL POINTS RENDER =================
function renderLocalPoints(){

  const arr = JSON.parse(localStorage.getItem("points") || "[]");

  arr.forEach(p=>{

    if(!p._rendered){

      const m = L.marker([p.lat,p.lng],{
        icon: icon(p.category)
      }).addTo(map);

      m.on("click", ()=>{
        openPanelFromPoint(p);
      });

      p._rendered = true;
    }
  });

  localStorage.setItem("points", JSON.stringify(arr));
}

// ================= OPEN FROM POINT =================
function openPanelFromPoint(p){

  current = {lat:p.lat, lng:p.lng};

  document.getElementById("category").value = p.category;
  document.getElementById("access").value = p.access;
  document.getElementById("desc").value = p.desc;

  photos = p.photos || [];
  renderPhotos();

  openPanel();

  map.setView([p.lat,p.lng],15); // center
}

// ================= MY POINTS FIX =================
function openMyPoints(){

  const box = document.getElementById("myPanel");
  box.style.display = "block";
  box.innerHTML = "<h3>📂 Мои точки</h3>";

  const arr = JSON.parse(localStorage.getItem("points") || "[]");

  arr.forEach(p=>{

    const div = document.createElement("div");

    div.innerHTML = `
      <hr>
      <b>${p.category}</b><br>
      ${p.desc || ""}<br>

      <button onclick="focusPoint(${p.lat},${p.lng})">📍 Показать на карте</button>
      <button onclick="editPointFromMy(${p.id})">✏️ Изменить</button>
      <button onclick="deletePoint(${p.id})">🗑 Удалить</button>
    `;

    box.appendChild(div);
  });
}

// ================= CENTER MAP =================
function focusPoint(lat,lng){
  map.setView([lat,lng],15);
}

// ================= EDIT FIX =================
function editPointFromMy(id){

  const arr = JSON.parse(localStorage.getItem("points") || "[]");
  const p = arr.find(x=>x.id === id);
  if(!p) return;

  current = {lat:p.lat,lng:p.lng};

  document.getElementById("category").value = p.category;
  document.getElementById("access").value = p.access;
  document.getElementById("desc").value = p.desc;

  photos = p.photos || [];
  renderPhotos();

  openPanel();

  map.setView([p.lat,p.lng],15);
}

// ================= INIT EXTENSION =================
setTimeout(()=>{
  renderLocalPoints();
},1000);

init();

</script>
</body>
</html>
