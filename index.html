<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UhaMap</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body { margin:0; font-family:Arial; }
#map { height:100vh; }

.panel {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  padding:12px;
  border-radius:15px 15px 0 0;
  z-index:9999;
  display:none;
  max-height:70vh;
  overflow:auto;
}

.row { margin-bottom:10px; }

select, textarea {
  width:100%;
  padding:10px;
}

button {
  width:100%;
  padding:12px;
  margin-top:6px;
  border:none;
  border-radius:10px;
}

.save { background:#ccc; }
.publish { background:#2a9d8f; color:#fff; }

</style>
</head>

<body>

<div id="map"></div>

<div class="panel" id="panel">

  <h3>Новая точка</h3>

  <div id="coords"></div>

  <div class="row">
    <select id="category"></select>
  </div>

  <div class="row">
    <select id="access">
      <option value="легковой">🚗 Легковой</option>
      <option value="внедорожник">🚙 Внедорожник</option>
      <option value="пешком">🚶 Пешком</option>
      <option value="лодка">🚤 Лодка</option>
    </select>
  </div>

  <div class="row">
    <select id="connection">
      <option value="нет">📴 Нет связи</option>
      <option value="слабая">📶 Слабая</option>
      <option value="стабильная">📡 Стабильная</option>
      <option value="4g">📶 4G/5G</option>
    </select>
  </div>

  <div class="row">
    <textarea id="desc" placeholder="описание"></textarea>
  </div>

  <button class="save" onclick="saveDraft()">💾 Сохранить</button>
  <button class="publish" onclick="publish()">🚀 Опубликовать</button>

</div>

<script>

const tg = window.Telegram.WebApp;
tg.expand();

const API = "YOUR_API_URL";

let map;
let current = null;
let marker = null;
let draft = null;

// ================= ПОЛНЫЙ СПИСОК =================
const categories = [
  "рыбалка","платная рыбалка",
  "кемпинг","лагерь","палатка","база отдыха",
  "пляж","платный пляж","место для купания","спуск катера","пирс",
  "опасный участок дороги","зимний проезд",
  "родник","колодец","арт-объект","достопримечательность","загадочное место","дикое место",
  "пожарная часть","медпомощь","туалет","мусорный бак"
];

// ================= ИКОНКИ =================
const icons = {
  "рыбалка":"🎣","платная рыбалка":"💰🎣",
  "кемпинг":"⛺","лагерь":"🏕️","палатка":"⛺","база отдыха":"🏡",
  "пляж":"🏖️","платный пляж":"💰🏖️","место для купания":"🏊","спуск катера":"🚤","пирс":"🌉",
  "опасный участок дороги":"⚠️","зимний проезд":"❄️⚠️",
  "родник":"💧","колодец":"🪣","арт-объект":"🎨","достопримечательность":"📍","загадочное место":"🧭","дикое место":"🌲",
  "пожарная часть":"🚒","медпомощь":"🏥","туалет":"🚻","мусорный бак":"🗑️"
};

function makeIcon(cat){
  return L.divIcon({
    html:`<div style="font-size:22px">${icons[cat] || "📍"}</div>`,
    className:""
  });
}

// ================= INIT =================
function init(){

  map = L.map('map').setView([55,37],10);

  const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  const sat = L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
  );

  L.control.layers({
    "Карта": osm,
    "Спутник": sat
  }).addTo(map);

  map.on("click", e => {

    current = e.latlng;

    if(marker) map.removeLayer(marker);

    marker = L.marker(current, {
      draggable:true,
      icon: makeIcon("рыбалка")
    }).addTo(map);

    marker.on("dragend", () => {
      current = marker.getLatLng();
      updateCoords();
    });

    updateCoords();
    openPanel();
  });

  document.getElementById("category").onchange = (e)=>{
    if(marker){
      marker.setIcon(makeIcon(e.target.value));
    }
  };

  fillCategories();
  loadPoints();
}

// ================= CATEGORY =================
function fillCategories(){
  const sel = document.getElementById("category");

  categories.forEach(c=>{
    const opt=document.createElement("option");
    opt.value=c;
    opt.innerText=c;
    sel.appendChild(opt);
  });
}

// ================= UI =================
function updateCoords(){
  document.getElementById("coords").innerText =
    current.lat.toFixed(5)+", "+current.lng.toFixed(5);
}

function openPanel(){
  document.getElementById("panel").style.display="block";
}

function closePanel(){
  document.getElementById("panel").style.display="none";
  if(marker){
    map.removeLayer(marker);
    marker=null;
  }
}

// ================= DRAFT =================
function saveDraft(){

  draft = {
    lat: current.lat,
    lng: current.lng,
    category: category.value,
    access: access.value,
    connection: connection.value,
    description: desc.value
  };

  alert("💾 Сохранено локально");
}

// ================= PUBLISH =================
async function publish(){

  await fetch(API,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      action:"savePoint",
      data:{
        lat: current.lat,
        lng: current.lng,
        category: category.value,
        access: access.value,
        connection: connection.value,
        description: desc.value,
        user_id: tg.initDataUnsafe?.user?.id,
        user_name: tg.initDataUnsafe?.user?.first_name
      }
    })
  });

  alert("🚀 Отправлено на модерацию");

  closePanel();
  loadPoints();
}

// ================= LOAD =================
async function loadPoints(){

  const res = await fetch(API + "?action=getPoints");
  const data = await res.json();

  data.forEach(p=>{
    if(p.status !== "approved") return;

    L.marker([p.lat,p.lng],{
      icon: makeIcon(p.category)
    }).addTo(map)
    .bindPopup(`${icons[p.category] || ""} ${p.category}<br>${p.description || ""}`);
  });
}

init();

</script>
</body>
</html>
