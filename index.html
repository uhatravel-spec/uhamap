<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UhaMap</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body { margin:0; font-family:Arial; }
#map { height:100vh; }

.menu {
  position:fixed;
  top:10px;
  left:10px;
  z-index:9999;
}

.menu button {
  background:#2a9d8f;
  color:#fff;
  border:none;
  padding:10px;
  border-radius:10px;
}

.panel {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  padding:15px;
  border-radius:20px 20px 0 0;
  display:none;
  z-index:9999;
  height:33vh;
  overflow-y:auto;
  box-shadow:0 -5px 20px rgba(0,0,0,0.2);
}

.handle {
  text-align:center;
  font-size:22px;
  cursor:pointer;
}

.photos img {
  width:70px;
  height:70px;
  object-fit:cover;
  margin:5px;
  border-radius:8px;
}

.selected-marker {
  transform: scale(1.5);
}
</style>
</head>

<body>

<div id="map"></div>

<div class="menu">
  <button onclick="UI.openMyPoints()">📂 Мои точки</button>
</div>

<!-- PANELS -->
<div class="panel" id="panel">
  <div class="handle" onclick="UI.toggle()">—</div>

  <h3 id="title">📍 Новая точка</h3>
  <div id="coords"></div>

  <select id="category"></select>
  <select id="access">
    <option>легковой</option>
    <option>внедорожник</option>
    <option>пешком</option>
    <option>лодка</option>
  </select>

  <textarea id="desc"></textarea>

  <button onclick="UI.camera()">📸 Фото</button>
  <input type="file" id="camera" accept="image/*" capture="environment" hidden>

  <div class="photos" id="photos"></div>

  <button onclick="Point.save()">Сохранить</button>
</div>

<div class="panel" id="myPanel"></div>

<div class="panel" id="infoPanel">
  <div class="handle" onclick="UI.closeInfo()">—</div>
  <div id="infoContent"></div>
</div>

<script>

/* ===================== STORAGE ===================== */
const Storage = {
  get(){ return JSON.parse(localStorage.getItem("points")||"[]"); },
  set(v){ localStorage.setItem("points",JSON.stringify(v)); }
};

/* ===================== MAP ===================== */
const Map = {
  init(){
    this.map = L.map("map").setView([55,37],10);

    const osm = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png");
    const sat = L.tileLayer("https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}",{
      subdomains:["mt0","mt1","mt2","mt3"]
    });

    osm.addTo(this.map);
    L.control.layers({"OSM":osm,"SAT":sat}).addTo(this.map);

    this.map.locate({watch:true});

    this.map.on("locationfound",e=>{
      if(this.user) this.map.removeLayer(this.user);

      this.user = L.circleMarker(e.latlng,{
        radius:8,color:"blue",fillOpacity:1
      }).addTo(this.map);
    });

    this.map.on("click",e=>{
      Point.current = e.latlng;
      UI.openPanel();
      UI.addTempMarker(e.latlng);
    });
  },

  center(lat,lng){
    const zoom = this.map.getZoom();
    const offset = window.innerHeight/6;

    const p = this.map.project([lat,lng],zoom).subtract([0,offset]);
    this.map.setView(this.map.unproject(p,zoom),zoom,{animate:true});
  }
};

/* ===================== POINTS ===================== */
const Point = {
  current:null,
  activeMarker:null,
  tempMarker:null,

  load(){
    if(this.layer) Map.map.removeLayer(this.layer);
    this.layer = L.layerGroup().addTo(Map.map);

    Storage.get().forEach(p=>{
      const m = L.marker([p.lat,p.lng],{icon:Icon(p.category)}).addTo(this.layer);

      m.on("click",()=>{
        this.setActive(m,p);
      });
    });
  },

  setActive(marker,p){

    if(this.activeMarker){
      this.activeMarker.getElement()?.classList.remove("selected-marker");
    }

    this.activeMarker = marker;
    setTimeout(()=>{
      marker.getElement()?.classList.add("selected-marker");
    },10);

    UI.openInfo(p);
    Map.center(p.lat,p.lng);
  },

  save(){
    let arr = Storage.get();

    if(UI.editMode){
      arr = arr.map(p=>{
        if(p.id===UI.editId){
          return {...p,
            category:category.value,
            access:access.value,
            desc:desc.value,
            photos:UI.photos
          };
        }
        return p;
      });
    } else {
      arr.push({
        id:Date.now(),
        lat:this.current.lat,
        lng:this.current.lng,
        category:category.value,
        access:access.value,
        desc:desc.value,
        photos:UI.photos
      });
    }

    Storage.set(arr);
    this.load();
    UI.closePanel();
  }
};

/* ===================== UI ===================== */
const UI = {
  editMode:false,
  editId:null,
  photos:[],

  openPanel(){
    panel.style.display="block";
  },

  closePanel(){
    panel.style.display="none";
    this.editMode=false;
  },

  toggle(){
    panel.style.height = panel.offsetHeight<300?"33vh":"10vh";
  },

  addTempMarker(latlng){
    if(Point.tempMarker) Map.map.removeLayer(Point.tempMarker);
    Point.tempMarker = L.marker(latlng,{icon:Icon("рыбалка")}).addTo(Map.map);
  },

  openInfo(p){
    infoPanel.style.display="block";
    infoContent.innerHTML=`
      <b>${p.category}</b><br>
      ${p.desc||""}<br>
      ${(p.photos||[]).map(i=>`<img src="${i}" width="60">`).join("")}
      <button onclick="UI.edit(${p.id})">✏️ Изменить</button>
    `;
  },

  closeInfo(){
    infoPanel.style.display="none";
  },

  edit(id){
    const p = Storage.get().find(x=>x.id===id);

    this.editMode=true;
    this.editId=id;

    Point.current = {lat:p.lat,lng:p.lng};

    category.value=p.category;
    access.value=p.access;
    desc.value=p.desc;

    this.photos = p.photos||[];

    this.closeInfo();
    Map.center(p.lat,p.lng);
    this.openPanel();
  },

  camera(){
    camera.click();
  }
};

/* ===================== ICON ===================== */
function Icon(c){
  return L.divIcon({
    html:`<div style="font-size:22px">${c}</div>`
  });
}

/* ===================== INIT ===================== */
Map.init();
Point.load();

</script>

</body>
</html>
