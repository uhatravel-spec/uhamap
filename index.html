<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UhaMap</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body { margin:0; font-family:Arial; }
#map { height:100vh; }

.menu {
  position:fixed;
  top:10px;
  left:10px;
  z-index:9999;
}

.menu button {
  background:#2a9d8f;
  color:#fff;
  border:none;
  padding:10px;
  border-radius:10px;
  margin-bottom:5px;
}

.panel {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  padding:15px;
  border-radius:20px 20px 0 0;
  display:none;
  z-index:9999;

  height:33vh;
  max-height:90vh;

  overflow-y:auto;
  -webkit-overflow-scrolling: touch;

  box-shadow:0 -5px 20px rgba(0,0,0,0.2);
  transition:height 0.2s ease;
}

.handle {
  text-align:center;
  font-size:22px;
  cursor:pointer;
  margin-bottom:5px;
}

.row { margin-bottom:10px; }

select, textarea, button {
  width:100%;
  padding:10px;
  box-sizing: border-box;
}
.photos img {
  width:70px;
  height:70px;
  object-fit:cover;
  margin:5px;
  border-radius:8px;
}
.active-point {
  background: #e0f0ff !important;
  box-shadow: inset 0 0 0 2px #2a9d8f;
  border-radius: 10px;
}

/* selected marker */
.selected-marker {
  transform: scale(1.5);
}

/* 🔵 user ring marker */
.user-ring {
  width:18px;
  height:18px;
  border-radius:50%;
  border:3px solid #1e90ff;
  background:rgba(30,144,255,0.2);
  box-shadow:0 0 10px rgba(30,144,255,0.6);
}

.point-card {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  background: #fff;
  border-radius: 18px 18px 0 0;
  padding: 12px;
  z-index: 10000;
  box-shadow: 0 -5px 20px rgba(0,0,0,0.2);
  max-height: 45vh;
  overflow-y: auto;
  transition: transform 0.2s ease;
}

.point-card.hidden {
  transform: translateY(100%);
}

.point-card-header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:8px;
}

.point-card-title {
  font-size:16px;
  font-weight:600;
}

.point-card-close {
  background:none;
  border:none;
  font-size:18px;
}

.point-card-actions button {
  width:100%;
  margin-top:6px;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="pointCard" class="point-card hidden"></div>

<div class="menu">
  <button onclick="openMyPoints()">📂 Мои точки</button>
  <button onclick="enableCreateMode()">➕ Создать точку</button>
</div>

<div class="panel" id="panel">
  <div style="display:flex; justify-content:space-between; align-items:center;">
  <div class="handle" onclick="togglePanel()">—</div>
  <button onclick="closePanel()" style="width:auto;padding:5px 10px;border-radius:8px;">✖</button>
</div>

  <h3 id="title">📍 Новая точка</h3>
  <div id="coords"></div>

  <div class="row">
    <select id="category"></select>
  </div>

  <div class="row">
    <select id="access">
      <option>легковой</option>
      <option>внедорожник</option>
      <option>пешком</option>
      <option>лодка</option>
    </select>
  </div>

  <div class="row">
    <textarea id="desc" placeholder="Описание"></textarea>
  </div>

  <button onclick="requestCamera()">📸 Фото</button>
  <input type="file" id="camera" accept="image/*" capture="environment">

  <div class="photos" id="photos"></div>
  <div id="photoStatus" style="font-size:12px;color:gray;"></div>

  <button onclick="saveDraft()">Сохранить</button>
  <button onclick="publish()">Опубликовать</button>
  <button onclick="closePanel()">Закрыть</button>
</div>

<div class="panel" id="myPanel"></div>

<div class="panel" id="infoPanel" style="height:25vh;">
  <div class="handle" onclick="closeInfo()">—</div>
  <div id="infoContent"></div>
</div>

<script>

const tg = window.Telegram.WebApp;
tg.expand();

const API = "https://uhamap.com/api";

let map;
let current = null;
let tempMarker = null;
let userMarker = null;
let userCircle = null;
const ALLOWED_RADIUS = 15; // радиус = 15м (диаметр 30м)
let photos = [];
const DB_NAME = "uhamap_db";
const DB_VERSION = 1;
const PHOTO_STORE = "photos";

let db;

function initDB() {
  const request = indexedDB.open(DB_NAME, DB_VERSION);

  request.onupgradeneeded = function (e) {
    const db = e.target.result;

    if (!db.objectStoreNames.contains(PHOTO_STORE)) {
      db.createObjectStore(PHOTO_STORE, { keyPath: "id" });
    }
  };

  request.onsuccess = function (e) {
    db = e.target.result;
    console.log("IndexedDB ready");
  };

  request.onerror = function (e) {
    console.error("IndexedDB error", e);
  };
}
function savePhotoBlob(blob) {
  return new Promise((resolve, reject) => {

    if (!db) {
      reject("DB not ready");
      return;
    }

    const id = Date.now() + "_" + Math.random().toString(16).slice(2);

    const tx = db.transaction([PHOTO_STORE], "readwrite");
    const store = tx.objectStore(PHOTO_STORE);

    const req = store.put({ id, blob });

    req.onsuccess = () => resolve(id);
    req.onerror = () => reject(req.error);

  });
}

function getPhotoBlob(id) {
  return new Promise((resolve) => {
    const tx = db.transaction([PHOTO_STORE], "readonly");
    const store = tx.objectStore(PHOTO_STORE);

    const req = store.get(id);

    req.onsuccess = () => {
      resolve(req.result?.blob || null);
    };
  });
}

let editMode = false;
let editId = null;
let publishId = null;

let activeMarker = null;
let activePointId = null;

let createMode = false;

let userZoomChanged = false;
let panelOpen = false;
let initialLocationSet = false;
let pointConfirmed = false;
const category = document.getElementById("category");
const access = document.getElementById("access");
const desc = document.getElementById("desc");

/* PANEL */
const ui = {
  open: null // "create" | "my" | "info" | null
};
const panelEl = document.getElementById("panel");
const infoPanel = document.getElementById("infoPanel");
const myPanel = document.getElementById("myPanel");
const title = document.getElementById("title");
const coords = document.getElementById("coords");

function setPanel(h){
  panelEl.style.height = (window.innerHeight * h) + "px";
}
function renderUI(){

  panelEl.style.display = "none";
  myPanel.style.display = "none";
  infoPanel.style.display = "none";

  if (ui.open === "create") {
    panelEl.style.display = "block";
  }

  if (ui.open === "my") {
    myPanel.style.display = "block";
  }

  if (ui.open === "info") {
    infoPanel.style.display = "block";
  }
}
function closeMyPanel(){
  myPanel.style.display = "none";
  ui.open = null;
  renderUI();
}

function closeInfoPanel(){
  infoPanel.style.display = "none";
  ui.open = null;
}

function closeCreatePanel(){
  panelEl.style.display = "none";
  ui.open = null;
}

function togglePanel(){
  panelOpen = !panelOpen;

  if (panelOpen) {
    setPanel(0.33);
  } else {
    setPanel(0.1);
  }
}

/* OFFSET */
function centerWithTop(lat, lng) {

  if (!map) return;

  const zoom = map.getZoom();

  // ❗ останавливаем все анимации (это ключ к отсутствию "прыжков")
  map.stop();

  // 1. ставим центр БЕЗ анимации
  map.setView([lat, lng], zoom, { animate: false });

  // 2. ждём рендер
  setTimeout(() => {

    const size = map.getSize();

    // 🎯 смещение как в Google Maps (точка выше центра)
    const targetY = size.y * 0.38;

    const point = map.latLngToContainerPoint([lat, lng]);

    const offset = point.y - targetY;

    // 🔒 убираем микродёргание
    if (Math.abs(offset) < 3) return;

    map.panBy([0, offset], {
      animate: true,
      duration: 0.25
    });

  }, 80);
}

/* ICONS */
const icons = {
  "новая_точка":"📌",
  "рыбалка":"🎣",
  "платная рыбалка":"💰🎣",
  "кемпинг":"⛺",
  "пляж":"🏖️",
  "опасно":"⚠️",
  "родник":"💧",
  "пирс":"🌉"
};

function icon(cat){
  return L.divIcon({
    html:`<div style="font-size:22px">${icons[cat] || "📍"}</div>`,
    className:""
  });
}

/* INIT */
function init(){

  map = L.map('map', {
    center: [55, 37],
    zoom: 10,
    zoomControl: true
  });

  const normal = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');

  const sat = L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
  );

  normal.addTo(map);

  L.control.layers({
    "Обычная":normal,
    "Спутник":sat
  }).addTo(map);

  map.on("zoomend", ()=> {
  userZoomChanged = true;
});

map.on("dragstart", ()=> {
  userZoomChanged = true;
});

map.locate({
  watch: true,
  enableHighAccuracy: true,
  setView: false,
  maximumAge: 0,
  timeout: 10000
});

let geoSet = false;

map.on("locationfound", e => {

  const latlng = e.latlng;

  if (!geoSet) {
    setTimeout(() => {
      centerWithTop(latlng.lat, latlng.lng);
    }, 100);
    geoSet = true;
  }

  // 🔵 маркер пользователя
  if (!userMarker) {
    userMarker = L.marker(latlng, {
      icon: L.divIcon({
        className: "",
        html: `<div class="user-ring"></div>`
      })
    }).addTo(map);
  } else {
    userMarker.setLatLng(latlng);
  }

  // 🔵 круг — ВСЕГДА отдельно
  if (!userCircle) {
    userCircle = L.circle(latlng, {
      radius: ALLOWED_RADIUS,
      color: "#2a9d8f",
      weight: 1,
      fillOpacity: 0.05
    }).addTo(map);
  } else {
    userCircle.setLatLng(latlng);
  }

});
  map.on("click", e => {

    if (!createMode) return;

    current = e.latlng;

    if (!tempMarker) {

      tempMarker = L.marker(current, {
        icon: icon(category.value || "новая_точка"),
        draggable: true
      }).addTo(map);

      tempMarker.on("dragend", (ev) => {
        current = ev.target.getLatLng();
      });

      openPanel();
    } else {
      tempMarker.setLatLng(current);
    }
  });

  fillCategories();
  PointStore.sync();
  initDB();
  loadPointsFromServer();
}

function enableCreateMode(){

  createMode = true;
  pointConfirmed = true;
  publishId = null;

  const center = map.getCenter();

  current = {
    lat: center.lat,
    lng: center.lng
  };

  if (tempMarker) {
    map.removeLayer(tempMarker);
    tempMarker = null;
  }

  tempMarker = L.marker(current, {
    icon: icon("новая_точка"),
    draggable: true
  }).addTo(map);

  tempMarker.on("dragend", (e) => {
    current = e.target.getLatLng();
  });

  openPanel();
}

/* CATEGORY */
function fillCategories(){

  const sel = category;
  sel.innerHTML = "";

  Object.keys(icons).forEach(c => {
    let o = document.createElement("option");
    o.value = c;
    o.innerHTML = `${icons[c]} ${c}`;
    sel.appendChild(o);
  });

  // 🔥 ОДИН единственный обработчик изменения категории
  category.addEventListener("change", () => {

    // если временная точка уже создана — меняем иконку сразу
    if (tempMarker) {
      tempMarker.setIcon(icon(category.value));
    }

  });
}

/* PHOTO FIX */
const photosEl = document.getElementById("photos");
const camera = document.getElementById("camera");

function requestCamera(){

  if (!camera) return;

  if (document.activeElement) {
    document.activeElement.blur();
  }

  setTimeout(() => {
    camera.click();
  }, 100);
}

camera.onchange = async (e) => {

  const file = e.target.files[0];
  if (!file) return;

  const status = document.getElementById("photoStatus");

  if (!db) {
    status.innerText = "⏳ Инициализация базы...";
    return;
  }

  status.innerText = "📸 Загрузка фото...";

  try {

    const id = await savePhotoBlob(file);

    photos.push(id);

    renderPhotos();

    status.innerText = "✅ Фото загружено";

    camera.value = "";

  } catch (err) {

    console.error(err);
    status.innerText = "❌ Ошибка сохранения фото";

  }
};
async function renderPhotos(){

  photosEl.innerHTML = "";

  for (let i = 0; i < photos.length; i++) {

    const id = photos[i];
    const blob = await getPhotoBlob(id);

    if (!blob) continue;

    const url = URL.createObjectURL(blob);

    const wrapper = document.createElement("div");
    wrapper.style.display = "inline-block";
    wrapper.style.position = "relative";

    const img = document.createElement("img");
    img.src = url;

   img.onclick = () => {
     openFullGallery(photos, i);
   };

    const del = document.createElement("button");
    del.innerText = "×";
    del.style.position = "absolute";
    del.style.top = "0";
    del.style.right = "0";

    del.onclick = () => {
      photos.splice(i, 1);
      renderPhotos();
    };

    wrapper.appendChild(img);
    wrapper.appendChild(del);
    photosEl.appendChild(wrapper);
  }
}
function saveDraft(){

  // 🔴 1. блокировка пока фото грузится
  const status = document.getElementById("photoStatus");

  if (status && status.innerText === "📸 Загрузка фото...") {
    alert("Подожди, фото ещё загружается");
    return;
  }

  // 🔴 2. проверка точки
  if (!current || !current.lat || !current.lng) {
    alert("Сначала укажи точку на карте");
    return;
  }

  // 🔴 3. проверка геолокации
  if (!userMarker) {
    alert("Геолокация не определена. Подожди пару секунд.");
    return;
  }

  // 🔴 4. проверка расстояния
 // 🔵 4. проверка расстояния (создание + редактирование)
const userLatLng = userMarker.getLatLng();

const distance = map.distance(userLatLng, current);

console.log("DISTANCE:", distance);

// 🚨 ограничение работает ТОЛЬКО при создании и редактировании
if (createMode || editMode) {

  if (distance > ALLOWED_RADIUS) {
    alert("Подойди ближе к точке (до 15 метров)");
    return;
  }

}

  // 🔵 5. загрузка массива
  let arr = JSON.parse(localStorage.getItem("points") || "[]");

  if (editMode) {

    arr = arr.map(p =>
      p.id === editId
        ? {
            ...p,
            category: category.value,
            access: access.value,
            desc: desc.value,
            photos: [...photos]
          }
        : p
    );

  } else {

    arr.push({
      id: Date.now(),
      lat: current.lat,
      lng: current.lng,
      category: category.value,
      access: access.value,
      desc: desc.value,
      photos: [...photos],
      status: "local",
      published: false   // 👈 добавили
    });
  }


// 🔵 6. обновление карты
PointStore.sync();

// 🔵 7. очистка состояния фото
photos = [];
renderPhotos();

  const statusEl = document.getElementById("photoStatus");
  if (statusEl) statusEl.innerText = "";

  publishId = null;

  closePanel();

  createMode = false;
}
/* INFO */
function openInfo(p){
  panelOpen = true;

  activePointId = p.id;

  const box = document.getElementById("infoContent");

  box.innerHTML = `
    <b>${icons[p.category]} ${p.category}</b><br>
    📍 ${p.lat.toFixed(5)}, ${p.lng.toFixed(5)}<br>
    🚗 ${p.access}<br>
    📝 ${p.desc || ""}<br>
    ${(p.photos||[]).map((ph, i)=>`
  <img src="${ph}" width="60" onclick='openFullGallery(${JSON.stringify(p.photos)}, ${i})'>
`).join("")}
    <button onclick="editPoint(${p.id})">✏️ Изменить</button>
    <button onclick="deletePoint(${p.id})">🗑 Удалить</button>
  `;

  infoPanel.style.display="block";
}
function openPointInfo(p){

  publishId = p.id;

  const card = document.getElementById("pointCard");

  card.innerHTML = `
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <div class="point-card-title">
        ${icons[p.category]} ${p.category}
      </div>
      <button onclick="closePointInfo()" style="width:auto;padding:5px 10px;border-radius:8px;">✖</button>
    </div>

    <div style="font-size:13px; color:#555;">
      📍 ${p.lat.toFixed(5)}, ${p.lng.toFixed(5)}<br>
      🚗 ${p.access}<br>
      📝 ${p.desc || ""}<br>
    </div>

    <div id="pointPhotos"></div>

    <div class="point-card-actions">

      ${p.published ? '<div style="color:green">🟡 На модерации</div>' : ''}

      ${!p.published ? `<button onclick="publish()">📤 Опубликовать</button>` : ''}

      <button onclick="editPoint(${p.id})">✏️ Изменить</button>
      <button onclick="deletePoint(${p.id})">🗑 Удалить</button>
</div>
    </div>
  `;

card.classList.remove("hidden");

setTimeout(() => {

  const container = document.getElementById("pointPhotos");
  if (!container) return;

  (async () => {
    for (let i = 0; i < (p.photos || []).length; i++) {

      const id = p.photos[i];
      const blob = await getPhotoBlob(id);
      if (!blob) continue;

      const url = URL.createObjectURL(blob);

      const img = document.createElement("img");
      img.src = url;
      img.width = 60;
      img.style.margin = "4px";
      img.style.borderRadius = "6px";

      img.onclick = () => openFullGallery(p.photos, i);

      container.appendChild(img);
    }
  })();

}, 0);

}
/* STORE */
const PointStore = {

  sync(){

    const local = JSON.parse(localStorage.getItem("points") || "[]");
    const server = window.serverPoints || [];
    const map = new Map();

    [...server, ...local].forEach(p => {
    map.set(p.id, p);
    });

    const arr = Array.from(map.values());

    if (!window.layer) {
      window.layer = L.layerGroup().addTo(map);
    } else {
      if (!window.layer) {
        window.layer = L.layerGroup().addTo(map);
      }
      window.layer.clearLayers();
    }

    arr.forEach(p => {

      const m = L.marker([p.lat, p.lng], {
        icon: icon(p.category)
      });

      m._data = p;

      if (p.id === activePointId) {
        setTimeout(() => {
          highlightMarker(m);
        }, 0);
      }

      m.on("click", () => {

        activePointId = p.id;
        highlightMarker(m);

        current = { lat: p.lat, lng: p.lng };

        centerWithTop(p.lat, p.lng);

        openPointInfo(p);
      });

      window.layer.addLayer(m);

    });

  }

};
function closePointInfo(){
  document.getElementById("pointCard").classList.add("hidden");
}

/* HIGHLIGHT */
function highlightMarker(marker){

  // убрать старую подсветку
  if (activeMarker && activeMarker.getElement()) {
    activeMarker.getElement().classList.remove("selected-marker");
  }

  activeMarker = marker;

  // 🔥 ВАЖНО: ждать пока DOM появится
  setTimeout(() => {
    const el = marker.getElement();

    if (el) {
      el.classList.add("selected-marker");
    }
  }, 0);
}

/* MY POINTS */
function openMyPoints(){
  ui.open = "my";
  renderUI();
  const box = myPanel;
  panelEl.style.display = "none";
  infoPanel.style.display = "none";

  box.innerHTML = `
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <div class='handle' onclick='toggleMyPanel()'>—</div>
    <button onclick="closeMyPanel()" style="width:auto;padding:5px 10px;border-radius:8px;">✖</button>
  </div>
  <h3>Мои точки</h3>
`;

  const arr = JSON.parse(localStorage.getItem("points") || "[]");

  arr.forEach(p => {

    const d = document.createElement("div");

    // 🔥 подсветка выбранной точки
    if (p.id === activePointId) {
      d.classList.add("active-point");
    }

    d.style.padding = "10px";
    d.style.marginBottom = "8px";
    d.style.cursor = "pointer";

   d.innerHTML = `
  ${icons[p.category]} ${p.category}<br>
  <small>${p.desc || ""}</small><br>

  <div class="preview"></div>

  <br>

  <button onclick="focusPoint(${p.lat},${p.lng})">📍 Показать</button>
  <button onclick="editPoint(${p.id})">✏️ Изменить</button>
  <button onclick="deletePoint(${p.id})">🗑 Удалить</button>
`;
const preview = d.querySelector(".preview");

(async () => {

  if (!preview) return;

  for (let ph of (p.photos || []).slice(0,3)) {

    const blob = await getPhotoBlob(ph);
    if (!blob) continue;

    const url = URL.createObjectURL(blob);

    const img = document.createElement("img");
    img.src = url;
    img.width = 50;
    img.style.marginRight = "5px";
    img.style.borderRadius = "6px";

    // ✅ ВАЖНО — открытие галереи
    img.onclick = () => openFullGallery(p.photos, (p.photos || []).indexOf(ph));
    img.style.marginRight = "5px";
    img.style.borderRadius = "6px";

    preview.appendChild(img);
  }

})();

    // 🔥 КЛИК ПО БЛОКУ = ВЫБОР ТОЧКИ
    d.onclick = (e) => {

      // чтобы кнопки не ломали клик
      if (e.target.tagName === "BUTTON") return;

      activePointId = p.id;

      PointStore.sync();   // обновить карту
      openMyPoints();      // обновить список

      centerWithTop(p.lat, p.lng);
    };

    box.appendChild(d);
  });

  box.style.height = "33vh";
}

function toggleMyPanel(){
  if (myPanel.style.display === "none" || myPanel.style.display === "") {
    myPanel.style.display = "block";
    myPanel.style.height = "33vh";
  } else {
    myPanel.style.display = "none";
  }
}

function focusPoint(lat,lng){
  centerWithTop(lat,lng, true);
}

/* EDIT */
function editPoint(id){

  closePointInfo();
  closeMyPanel();
  const arr=JSON.parse(localStorage.getItem("points")||"[]");
  const p=arr.find(x=>x.id===id);
  if(!p) return;

  editMode=true;
  editId=id;
  publishId = id;

  current={lat:p.lat,lng:p.lng};

  category.value=p.category;
  access.value=p.access;
  desc.value=p.desc;

  photos=[...(p.photos||[])];
  renderPhotos();

  title.innerText="✏️ Редактирование";

  closeInfo();
  centerWithTop(p.lat,p.lng);
  openPanel();
}

/* DELETE */
function deletePoint(id){
  let arr=JSON.parse(localStorage.getItem("points")||"[]");
  arr=arr.filter(x=>x.id!==id);

  localStorage.setItem("points",JSON.stringify(arr));

  PointStore.sync();
  closeInfo();
  openMyPoints();
}

/* PANEL */
function openPanel(){
  ui.open = "create";
  renderUI();

  panelOpen = true;

  if(current){
    coords.innerText=current.lat.toFixed(5)+", "+current.lng.toFixed(5);
  }
}

function closePanel(){

  if (!editMode && tempMarker) {
    map.removeLayer(tempMarker);
    tempMarker = null;
    current = null;
  }

  createMode = false;

  panelEl.style.display = "none";
  ui.open = null;
  panelOpen = false;

  editMode = false;
  editId = null;

  title.innerText = "📍 Новая точка";

  renderUI();
}
function closeInfo(){
  infoPanel.style.display = "none";
  ui.open = null;
  panelOpen = false;
  activePointId = null;
}

/* KEYBOARD FIX */
document.addEventListener("touchstart",e=>{
  if(!e.target.closest("textarea")){
    document.activeElement.blur();
  }
});

desc.addEventListener("focus", () => {
  setPanel(0.9);
});

desc.addEventListener("blur", () => {
  setTimeout(() => setPanel(0.33), 150);
});

function publish(){

  let arr = JSON.parse(localStorage.getItem("points") || "[]");

  const point = arr.find(p => p.id === publishId);

  if (!point) {
    alert("Точка не найдена");
    return;
  }

  if (point.published) {
    alert("Уже отправлено");
    return;
  }

  fetch(API + "/points", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(point)
  })
  .then(() => {

    point.published = true;

    localStorage.setItem("points", JSON.stringify(arr));

    alert("✅ Отправлено на модерацию");

    PointStore.sync();

  })
  .catch(err => {
    console.error("POST error", err);
    alert("❌ Ошибка отправки");
  });

}
init();
// 🔁 автообновление точек каждые 10 секунд
setInterval(() => {
  loadPointsFromServer();
}, 10000);

let galleryIndex = 0;
let galleryOverlay = null;
let galleryImg = null;
let galleryUrls = [];

async function buildGalleryUrls(photoIds){

  galleryUrls = [];

  for (let id of photoIds) {
    const blob = await getPhotoBlob(id);
    if (blob) {
      galleryUrls.push(URL.createObjectURL(blob));
    }
  }
}

async function openFullGallery(photoIds, index = 0){

  galleryIndex = index;

  if (galleryOverlay) {
    galleryOverlay.remove();
    galleryOverlay = null;
  }

  await buildGalleryUrls(photoIds);

  if (galleryUrls.length === 0) return;

  galleryOverlay = document.createElement("div");
  galleryOverlay.style.position = "fixed";
  galleryOverlay.style.top = "0";
  galleryOverlay.style.left = "0";
  galleryOverlay.style.width = "100%";
  galleryOverlay.style.height = "100%";
  galleryOverlay.style.background = "rgba(0,0,0,0.95)";
  galleryOverlay.style.display = "flex";
  galleryOverlay.style.alignItems = "center";
  galleryOverlay.style.justifyContent = "center";
  galleryOverlay.style.zIndex = "999999";

  const img = document.createElement("img");
  img.style.maxWidth = "92%";
  img.style.maxHeight = "80%";

  const render = () => {
    img.src = galleryUrls[galleryIndex];
  };

  render();

  galleryOverlay.onclick = closeGallery;

  let startX = 0;

  galleryOverlay.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
  });

  galleryOverlay.addEventListener("touchend", e => {

    let endX = e.changedTouches[0].clientX;

    if (endX < startX - 40 && galleryIndex < galleryUrls.length - 1) {
      galleryIndex++;
      render();
    }

    if (endX > startX + 40 && galleryIndex > 0) {
      galleryIndex--;
      render();
    }
  });

  galleryOverlay.appendChild(img);
  document.body.appendChild(galleryOverlay);
}
function closeGallery(){

  if (galleryOverlay) {
    galleryOverlay.remove();
    galleryOverlay = null;
  }

  // чистим URL чтобы не текла память
  galleryUrls.forEach(url => URL.revokeObjectURL(url));
  galleryUrls = [];
}
async function loadPointsFromServer(){

  try {

    const res = await fetch(API + "/points/public");
    const data = await res.json();

    window.serverPoints = data;
    PointStore.sync();

  } catch (err) {
    console.error("LOAD error", err);
  }
}
