<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UhaMap</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body { margin:0; font-family:Arial; }
#map { height:100vh; }

.panel {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  padding:12px;
  border-radius:15px 15px 0 0;
  display:none;
  z-index:9999;
  max-height:70vh;
  overflow:auto;
}

.menu {
  position:fixed;
  top:10px;
  left:10px;
  background:#fff;
  padding:10px;
  border-radius:10px;
  z-index:9999;
}

.row { margin-bottom:10px; }
select, textarea, input { width:100%; padding:10px; }
button { width:100%; padding:12px; margin-top:5px; }

.point-item {
  border-bottom:1px solid #eee;
  padding:10px;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="menu">
  <button onclick="openMyPoints()">📂 Мои точки</button>
</div>

<div class="panel" id="panel">
  <h3>Новая точка</h3>
  <div id="coords"></div>

  <div class="row">
    <select id="category"></select>
  </div>

  <div class="row">
    <select id="access">
      <option>легковой</option>
      <option>внедорожник</option>
      <option>пешком</option>
      <option>лодка</option>
    </select>
  </div>

  <div class="row">
    <textarea id="desc" placeholder="описание"></textarea>
  </div>

  <button onclick="saveDraft()">Сохранить</button>
  <button onclick="publishPoint()">Опубликовать</button>
  <button onclick="closePanel()">Закрыть</button>
</div>

<div class="panel" id="myPointsPanel"></div>

<script>

const tg = window.Telegram.WebApp;
tg.expand();

const API = "YOUR_API_URL";

let map;
let current;
let tempMarker;

// ================= КАТЕГОРИИ =================
const categories = [
"рыбалка","платная рыбалка","кемпинг","лагерь","палатка","база отдыха",
"пляж","платный пляж","место для купания","спуск катера","пирс",
"опасный участок дороги","зимний проезд",
"родник","колодец","арт-объект","достопримечательность","загадочное место","дикое место",
"пожарная часть","медпомощь","туалет","мусорный бак"
];

// ================= ИКОНКИ =================
function icon(cat){
  const icons = {
    "рыбалка":"🎣","платная рыбалка":"💰🎣","кемпинг":"⛺","лагерь":"🏕️",
    "палатка":"⛺","база отдыха":"🏡","пляж":"🏖️","платный пляж":"💰🏖️",
    "место для купания":"🌊","спуск катера":"🚤","пирс":"🌉",
    "опасный участок дороги":"⚠️","зимний проезд":"❄️",
    "родник":"💧","колодец":"🪣","арт-объект":"🎨","достопримечательность":"🏛️",
    "загадочное место":"❓","дикое место":"🌲",
    "пожарная часть":"🚒","медпомощь":"🏥","туалет":"🚻","мусорный бак":"🗑️"
  };

  return L.divIcon({
    html:`<div style="font-size:20px">${icons[cat] || "📍"}</div>`
  });
}

// ================= INIT =================
function init(){
  map = L.map('map').setView([55,37],10);

  const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  const sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');

  L.control.layers({ "Карта":osm,"Спутник":sat }).addTo(map);

  map.on("click", e=>{
    current = e.latlng;

    if(tempMarker) map.removeLayer(tempMarker);

    tempMarker = L.marker(current).addTo(map);

    openPanel();
  });

  fillCategories();
  loadPoints();
  loadLocalPoints();
}

// ================= CATEGORY =================
function fillCategories(){
  const sel = document.getElementById("category");
  categories.forEach(c=>{
    const o = document.createElement("option");
    o.value = c;
    o.innerText = c;
    sel.appendChild(o);
  });
}

// ================= LOCAL STORAGE =================
function getLocal(){
  return JSON.parse(localStorage.getItem("points") || "[]");
}

function saveLocal(points){
  localStorage.setItem("points", JSON.stringify(points));
}

// ================= SAVE DRAFT =================
function saveDraft(){

  const points = getLocal();

  const p = {
    id: Date.now(),
    lat: current.lat,
    lng: current.lng,
    category: document.getElementById("category").value,
    description: document.getElementById("desc").value,
    status: "draft",
    visible: true
  };

  points.push(p);
  saveLocal(points);

  drawPoint(p);

  closePanel();
}

// ================= PUBLISH =================
async function publishPoint(){

  const data = {
    lat: current.lat,
    lng: current.lng,
    category: document.getElementById("category").value,
    description: document.getElementById("desc").value,
    user_id: tg.initDataUnsafe?.user?.id,
    user_name: tg.initDataUnsafe?.user?.first_name
  };

  await fetch(API,{
    method:"POST",
    body:JSON.stringify({action:"savePoint",data})
  });

  alert("Отправлено на модерацию");
  closePanel();
}

// ================= LOAD SERVER =================
async function loadPoints(){
  const res = await fetch(API+"?action=getPoints");
  const data = await res.json();

  data.forEach(p=>{
    if(p.status !== "approved") return;

    L.marker([p.lat,p.lng],{icon:icon(p.category)})
      .addTo(map)
      .bindPopup(p.category);
  });
}

// ================= LOCAL POINTS =================
function loadLocalPoints(){
  const points = getLocal();
  points.forEach(drawPoint);
}

function drawPoint(p){

  if(!p.visible) return;

  L.marker([p.lat,p.lng],{icon:icon(p.category)})
    .addTo(map)
    .bindPopup(`${p.category}<br>${p.description}<br>(${p.status})`);
}

// ================= MY POINTS UI =================
function openMyPoints(){

  const panel = document.getElementById("myPointsPanel");
  panel.style.display="block";

  const points = getLocal();

  panel.innerHTML = "<h3>Мои точки</h3>";

  points.forEach(p=>{
    const div = document.createElement("div");
    div.className="point-item";

    div.innerHTML = `
      <b>${p.category}</b><br>
      ${p.status}<br>
      <button onclick="toggle(${p.id})">Показать/скрыть</button>
      <button onclick="removePoint(${p.id})">Удалить</button>
    `;

    panel.appendChild(div);
  });
}

// ================= ACTIONS =================
function toggle(id){
  let points = getLocal();
  points = points.map(p=>{
    if(p.id===id) p.visible = !p.visible;
    return p;
  });
  saveLocal(points);
  location.reload();
}

function removePoint(id){
  let points = getLocal().filter(p=>p.id!==id);
  saveLocal(points);
  location.reload();
}

// ================= PANEL =================
function openPanel(){
  document.getElementById("panel").style.display="block";
  document.getElementById("coords").innerText =
    current.lat.toFixed(5)+", "+current.lng.toFixed(5);
}

function closePanel(){
  document.getElementById("panel").style.display="none";
}

// ================= START =================
init();

</script>
</body>
</html>
