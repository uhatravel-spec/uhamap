<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UhaMap</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body { margin:0; font-family:Arial; }
#map { height:100vh; }

.menu {
  position:fixed;
  top:10px;
  left:10px;
  z-index:9999;
}

.menu button {
  background:#2a9d8f;
  color:#fff;
  border:none;
  padding:10px;
  border-radius:10px;
  margin-bottom:5px;
}

.panel {
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  background:#fff;
  padding:15px;
  border-radius:15px 15px 0 0;
  display:none;
  z-index:9999;

  height:70vh;
  max-height:95vh;

  overflow-y:auto;
  -webkit-overflow-scrolling: touch;

  transition: height 0.2s ease;
}

.drag-handle {
  width:40px;
  height:5px;
  background:#ccc;
  border-radius:10px;
  margin:0 auto 10px;
}

/* 🔥 toggle button */
.toggle-btn {
  position:absolute;
  right:15px;
  top:10px;
  border:none;
  background:none;
  font-size:18px;
}

.row { margin-bottom:10px; }

select, textarea, button {
  width:100%;
  padding:10px;
}

.photos img {
  width:70px;
  height:70px;
  object-fit:cover;
  margin:5px;
  border-radius:8px;
  border:2px solid transparent;
}

.photos img:hover {
  border:2px solid red;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="menu">
  <button onclick="openMyPoints()">📂 Мои точки</button>
</div>

<div class="panel" id="panel">

  <div class="drag-handle"></div>

  <!-- 🔥 ДОБАВЛЕНО -->
  <button class="toggle-btn" onclick="togglePanel()">⬇️</button>

  <h3 id="panelTitle">📍 Новая точка</h3>
  <div id="coords"></div>

  <div class="row">
    <select id="category"></select>
  </div>

  <div class="row">
    <select id="access">
      <option>легковой</option>
      <option>внедорожник</option>
      <option>пешком</option>
      <option>лодка</option>
    </select>
  </div>

  <div class="row">
    <textarea id="desc" placeholder="Описание"></textarea>
  </div>

  <button onclick="requestCamera()">📸 Сделать фото</button>
  <input type="file" id="camera" accept="image/*" capture="environment" hidden>

  <div class="photos" id="photos"></div>

  <button onclick="saveDraft()">Сохранить (локально)</button>
  <button onclick="publish()">Опубликовать</button>
  <button onclick="closePanel()">Закрыть</button>

</div>

<div class="panel" id="myPanel"></div>

<script>

const tg = window.Telegram.WebApp;
tg.expand();

const API = "YOUR_API_URL";

let map;
let current = null;
let tempMarker = null;
let userMarker = null;
let photos = [];

let editMode = false;
let editId = null;

/* 🔥 ДОБАВЛЕНО */
let localMarkers = [];

/* ================= PANEL HEIGHT ================= */

let panelState = 0.7;

function setPanelHeight(r){
  panelState = r;
  panel.style.height = (window.innerHeight * r) + "px";

  // 🔥 СМЕЩЕНИЕ КАРТЫ ЧТОБЫ ПОЛЬЗОВАТЕЛЬ НЕ УХОДИЛ ПОД ПАНЕЛЬ
  if(userMarker){
    const latlng = userMarker.getLatLng();
    const offset = panel.offsetHeight / 2;

    const point = map.project(latlng, map.getZoom()).subtract([0, offset]);
    const newLatLng = map.unproject(point, map.getZoom());

    map.panTo(newLatLng, {animate:true});
  }
}

/* 🔥 TOGGLE PANEL */
function togglePanel(){
  if(panelState === 0.7){
    setPanelHeight(0.4);
  } else {
    setPanelHeight(0.7);
  }
}

/* ================= LOCAL POINTS ================= */

function loadLocalPoints(){

  localMarkers.forEach(m => map.removeLayer(m));
  localMarkers = [];

  const arr = JSON.parse(localStorage.getItem("points") || "[]");

  arr.forEach(p=>{
    const m = L.marker([p.lat,p.lng],{
      icon: icon(p.category)
    }).addTo(map);

    localMarkers.push(m);
  });
}

/* ================= DRAG PANEL ================= */

let startY = 0;
let startHeight = 0;

panel.addEventListener("touchstart", e=>{
  startY = e.touches[0].clientY;
  startHeight = panel.offsetHeight;
});

panel.addEventListener("touchmove", e=>{
  const delta = startY - e.touches[0].clientY;
  let newH = startHeight + delta;

  const min = window.innerHeight * 0.4;
  const max = window.innerHeight * 0.95;

  newH = Math.max(min, Math.min(max, newH));
  panel.style.height = newH + "px";
});

panel.addEventListener("touchend", ()=>{
  const h = panel.offsetHeight / window.innerHeight;

  const states = [0.4, 0.7, 0.95];

  let closest = states.reduce((p,c)=>
    Math.abs(c-h) < Math.abs(p-h) ? c : p
  );

  setPanelHeight(closest);
});

/* ================= KEYBOARD UX ================= */

document.addEventListener("touchstart", e=>{
  if(!e.target.closest("textarea") && !e.target.closest("input")){
    document.activeElement.blur();
  }
});

const descEl = document.getElementById("desc");

descEl.addEventListener("focus", ()=>{
  setPanelHeight(0.95);
  setTimeout(()=>{
    descEl.scrollIntoView({behavior:"smooth", block:"center"});
  },300);
});

/* ================= ICONS ================= */

const icons = {
  "рыбалка":"🎣",
  "платная рыбалка":"💰🎣",
  "кемпинг":"⛺",
  "пляж":"🏖️",
  "опасно":"⚠️",
  "родник":"💧",
  "пирс":"🌉"
};

function icon(cat){
  return L.divIcon({
    html:`<div style="font-size:22px">${icons[cat] || "📍"}</div>`,
    className:""
  });
}

/* ================= INIT ================= */

function init(){

  map = L.map('map').setView([55,37],10);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  map.locate({setView:true, watch:true});

  map.on("locationfound", e=>{
    if(userMarker) map.removeLayer(userMarker);

    userMarker = L.circleMarker(e.latlng,{
      radius:8,
      color:"blue",
      fillColor:"blue",
      fillOpacity:1
    }).addTo(map).bindPopup("Вы здесь");
  });

  map.on("click", e=>{
    current = e.latlng;

    if(tempMarker) map.removeLayer(tempMarker);

    tempMarker = L.marker(current,{icon: icon("рыбалка")}).addTo(map);

    openPanel();
  });

  fillCategories();
  loadPoints();

  /* 🔥 ДОБАВЛЕНО */
  loadLocalPoints();
}

/* ================= SAVE ================= */

function saveDraft(){

  let arr = JSON.parse(localStorage.getItem("points") || "[]");

  if(editMode){
    arr = arr.map(p=>{
      if(p.id === editId){
        return {...p,
          category:category.value,
          access:access.value,
          desc:desc.value,
          photos
        };
      }
      return p;
    });
  } else {
    arr.push({
      id:Date.now(),
      lat:current.lat,
      lng:current.lng,
      category:category.value,
      access:access.value,
      desc:desc.value,
      photos,
      status:"draft"
    });
  }

  localStorage.setItem("points", JSON.stringify(arr));

  loadLocalPoints(); // 🔥

  closePanel();
  alert("Сохранено");
}

/* ================= DELETE ================= */

function deletePoint(id){

  let arr = JSON.parse(localStorage.getItem("points") || "[]");
  arr = arr.filter(x=>x.id !== id);

  localStorage.setItem("points", JSON.stringify(arr));

  loadLocalPoints(); // 🔥
  openMyPoints();
}

/* ================= REST OF YOUR CODE (UNCHANGED) ================= */

function requestCamera(){
  document.getElementById("camera").click();
}

document.getElementById("camera").addEventListener("change", e=>{
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = ev=>{
    photos.push(ev.target.result);
    renderPhotos();
  };

  reader.readAsDataURL(file);
});

function renderPhotos(){
  const box = document.getElementById("photos");
  box.innerHTML = "";

  photos.forEach((p,i)=>{
    let img = document.createElement("img");
    img.src = p;

    img.onclick = ()=>{
      photos.splice(i,1);
      renderPhotos();
    };

    box.appendChild(img);
  });
}

async function loadPoints(){
  const res = await fetch(API+"?action=getPoints");
  const data = await res.json();

  data.forEach(p=>{
    L.marker([p.lat,p.lng],{icon: icon(p.category)}).addTo(map);
  });
}

/* ================= START ================= */

init();

</script>
</body>
</html>
