<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UhaMap</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body { margin:0; font-family:Arial; }
#map { height:100vh; }

/* ================= MENU ================= */
.menu {
  position:fixed;
  top:10px;
  left:10px;
  z-index:9999;
}

.menu button {
  background:#2a9d8f;
  color:#fff;
  border:none;
  padding:10px;
  border-radius:10px;
  margin-bottom:5px;
}

/* ================= PANEL SYSTEM (NEW) ================= */
.panel {
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  background:#fff;
  border-radius:18px 18px 0 0;
  display:none;
  z-index:9999;

  height:33vh;            /* 1/3 экрана */
  max-height:95vh;

  overflow-y:auto;
  -webkit-overflow-scrolling: touch;

  box-shadow:0 -10px 25px rgba(0,0,0,0.15);

  transition: height 0.2s ease;
}

/* drag handle */
.drag-handle {
  width:45px;
  height:5px;
  background:#ccc;
  border-radius:10px;
  margin:10px auto;
}

/* collapsed state */
.panel.collapsed {
  height:55px !important;
  overflow:hidden;
}

/* ================= CONTENT ================= */
.row { margin-bottom:10px; }

select, textarea, button {
  width:100%;
  padding:10px;
  box-sizing:border-box;
}

.photos img {
  width:70px;
  height:70px;
  object-fit:cover;
  margin:5px;
  border-radius:8px;
}

/* ================= MY PANEL ================= */
#myPanel {
  padding:10px;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="menu">
  <button onclick="openMyPoints()">📂 Мои точки</button>
</div>

<!-- ================= CREATE / EDIT PANEL ================= -->
<div class="panel" id="panel">

  <div class="drag-handle" onclick="togglePanel('panel')"></div>

  <h3 id="panelTitle">📍 Новая точка</h3>

  <div id="coords"></div>

  <div class="row">
    <select id="category"></select>
  </div>

  <div class="row">
    <select id="access">
      <option>легковой</option>
      <option>внедорожник</option>
      <option>пешком</option>
      <option>лодка</option>
    </select>
  </div>

  <div class="row">
    <textarea id="desc" placeholder="Описание"></textarea>
  </div>

  <button onclick="requestCamera()">📸 Сделать фото</button>
  <input type="file" id="camera" accept="image/*" capture="environment" hidden>

  <div class="photos" id="photos"></div>

  <button onclick="saveDraft()">Сохранить (локально)</button>
  <button onclick="publish()">Опубликовать</button>
  <button onclick="closePanel()">Закрыть</button>

</div>

<!-- ================= MY POINTS PANEL ================= -->
<div class="panel" id="myPanel">
  <div class="drag-handle" onclick="togglePanel('myPanel')"></div>
</div>

<script>

const tg = window.Telegram.WebApp;
tg.expand();

const API = "YOUR_API_URL";

let map;
let current = null;
let tempMarker = null;
let userMarker = null;
let photos = [];

let editMode = false;
let editId = null;

// ================= PANEL ENGINE (NEW) =================
function openPanel(id){
  const el = document.getElementById(id);
  el.style.display = "block";
  el.classList.remove("collapsed");
}

function closePanel(){
  document.getElementById("panel").style.display = "none";
  editMode = false;
  editId = null;
  photos = [];
  renderPhotos();
  document.getElementById("panelTitle").innerText = "📍 Новая точка";
}

function togglePanel(id){
  const el = document.getElementById(id);
  el.classList.toggle("collapsed");
}

// ================= ICONS =================
const icons = {
  "рыбалка":"🎣",
  "платная рыбалка":"💰🎣",
  "кемпинг":"⛺",
  "пляж":"🏖️",
  "опасно":"⚠️",
  "родник":"💧",
  "пирс":"🌉"
};

function icon(cat){
  return L.divIcon({
    html:`<div style="font-size:22px">${icons[cat] || "📍"}</div>`,
    className:""
  });
}

// ================= INIT =================
function init(){

  map = L.map('map').setView([55,37],10);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  map.locate({setView:true, watch:true});

  map.on("locationfound", e=>{
    if(userMarker) map.removeLayer(userMarker);

    userMarker = L.circleMarker(e.latlng,{
      radius:8,
      color:"blue",
      fillColor:"blue",
      fillOpacity:1
    }).addTo(map);
  });

  map.on("click", e=>{
    current = e.latlng;

    if(tempMarker) map.removeLayer(tempMarker);

    tempMarker = L.marker(current,{icon: icon("рыбалка")}).addTo(map);

    openPanel("panel");
  });

  fillCategories();
  loadPoints();
}

// ================= CATEGORY =================
function fillCategories(){
  const sel = document.getElementById("category");
  sel.innerHTML = "";

  Object.keys(icons).forEach(c=>{
    let o = document.createElement("option");
    o.value = c;
    o.innerHTML = `${icons[c]} ${c}`;
    sel.appendChild(o);
  });

  sel.onchange = ()=>{
    if(tempMarker) map.removeLayer(tempMarker);
    tempMarker = L.marker(current,{icon: icon(sel.value)}).addTo(map);
  };
}

// ================= PHOTO =================
function requestCamera(){
  document.getElementById("camera").click();
}

document.getElementById("camera").addEventListener("change", e=>{
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = ev=>{
    photos.push(ev.target.result);
    renderPhotos();
  };

  reader.readAsDataURL(file);
});

function renderPhotos(){
  const box = document.getElementById("photos");
  box.innerHTML = "";

  photos.forEach((p,i)=>{
    let img = document.createElement("img");
    img.src = p;

    img.onclick = ()=>{
      photos.splice(i,1);
      renderPhotos();
    };

    box.appendChild(img);
  });
}

// ================= SAVE =================
function saveDraft(){
  let arr = JSON.parse(localStorage.getItem("points") || "[]");

  if(editMode){
    arr = arr.map(p=>{
      if(p.id === editId){
        return {...p,
          category:category.value,
          access:access.value,
          desc:desc.value,
          photos
        };
      }
      return p;
    });
  } else {
    arr.push({
      id:Date.now(),
      lat:current.lat,
      lng:current.lng,
      category:category.value,
      access:access.value,
      desc:desc.value,
      photos,
      status:"draft"
    });
  }

  localStorage.setItem("points", JSON.stringify(arr));
  closePanel();
}

// ================= PUBLISH =================
function publish(){

  fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      action:"savePoint",
      data:{
        lat:current.lat,
        lng:current.lng,
        category:category.value,
        access:access.value,
        description:desc.value,
        photos,
        user_id:tg.initDataUnsafe?.user?.id,
        user_name:tg.initDataUnsafe?.user?.first_name
      }
    })
  });

  closePanel();
}

// ================= LOAD =================
async function loadPoints(){
  const res = await fetch(API+"?action=getPoints");
  const data = await res.json();

  data.forEach(p=>{
    L.marker([p.lat,p.lng],{
      icon: icon(p.category)
    }).addTo(map);
  });
}

// ================= MY POINTS =================
function openMyPoints(){

  const box = document.getElementById("myPanel");
  openPanel("myPanel");

  box.innerHTML = "<h3>📂 Мои точки</h3>";

  const arr = JSON.parse(localStorage.getItem("points") || "[]");

  arr.forEach(p=>{
    const div = document.createElement("div");

    div.innerHTML = `
      <hr>
      <b>${icons[p.category]} ${p.category}</b><br>
      📍 ${p.lat.toFixed(5)}, ${p.lng.toFixed(5)}<br>
      📝 ${p.desc || ""}<br>
      <div>${(p.photos||[]).map(ph=>`<img src="${ph}" width="50">`).join("")}</div>
      <button onclick="editPoint(${p.id})">✏️ Изменить</button>
      <button onclick="deletePoint(${p.id})">🗑 Удалить</button>
    `;

    box.appendChild(div);
  });
}

// ================= EDIT =================
function editPoint(id){

  const arr = JSON.parse(localStorage.getItem("points") || "[]");
  const p = arr.find(x=>x.id === id);

  editMode = true;
  editId = id;

  current = {lat:p.lat, lng:p.lng};

  if(tempMarker) map.removeLayer(tempMarker);

  tempMarker = L.marker(current,{icon: icon(p.category)}).addTo(map);

  photos = [...(p.photos||[])];

  category.value = p.category;
  access.value = p.access;
  desc.value = p.desc || "";

  renderPhotos();

  document.getElementById("panelTitle").innerText = "✏️ Редактирование";

  openPanel("panel");
}

// ================= DELETE =================
function deletePoint(id){

  let arr = JSON.parse(localStorage.getItem("points") || "[]");
  arr = arr.filter(x=>x.id !== id);

  localStorage.setItem("points", JSON.stringify(arr));
  openMyPoints();
}

init();

</script>
</body>
</html>
