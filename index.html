<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UhaMap</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body { margin:0; font-family:Arial; }
#map { height:100vh; }

.menu {
  position:fixed;
  top:10px;
  left:10px;
  z-index:9999;
}

.menu button {
  background:#2a9d8f;
  color:#fff;
  border:none;
  padding:10px;
  border-radius:10px;
  margin-bottom:5px;
}

.panel {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  padding:15px;
  border-radius:20px 20px 0 0;
  display:none;
  z-index:9999;

  height:33vh;
  max-height:90vh;

  overflow-y:auto;
  -webkit-overflow-scrolling: touch;

  box-shadow:0 -5px 20px rgba(0,0,0,0.2);
  transition:height 0.2s ease;
}

.handle {
  text-align:center;
  font-size:22px;
  cursor:pointer;
  margin-bottom:5px;
}

.row { margin-bottom:10px; }

select, textarea, button {
  width:100%;
  padding:10px;
  box-sizing: border-box;
}
.photos img {
  width:70px;
  height:70px;
  object-fit:cover;
  margin:5px;
  border-radius:8px;
}
.active-point {
  background: #e0f0ff !important;
  box-shadow: inset 0 0 0 2px #2a9d8f;
  border-radius: 10px;
}

/* selected marker */
.selected-marker {
  transform: scale(1.5);
}

/* 🔵 user ring marker */
.user-ring {
  width:18px;
  height:18px;
  border-radius:50%;
  border:3px solid #1e90ff;
  background:rgba(30,144,255,0.2);
  box-shadow:0 0 10px rgba(30,144,255,0.6);
}
</style>
</head>

<body>

<div id="map"></div>

<div class="menu">
  <button onclick="openMyPoints()">📂 Мои точки</button>
  <button onclick="enableCreateMode()">➕ Создать точку</button>
</div>

<div class="panel" id="panel">
  <div style="display:flex; justify-content:space-between; align-items:center;">
  <div class="handle" onclick="togglePanel()">—</div>
  <button onclick="closePanel()" style="width:auto;padding:5px 10px;border-radius:8px;">✖</button>
</div>

  <h3 id="title">📍 Новая точка</h3>
  <div id="coords"></div>

  <div class="row">
    <select id="category"></select>
  </div>

  <div class="row">
    <select id="access">
      <option>легковой</option>
      <option>внедорожник</option>
      <option>пешком</option>
      <option>лодка</option>
    </select>
  </div>

  <div class="row">
    <textarea id="desc" placeholder="Описание"></textarea>
  </div>

  <button onclick="requestCamera()">📸 Фото</button>
  <input type="file" id="camera" accept="image/*" capture="environment">

  <div class="photos" id="photos"></div>
  <div id="photoStatus" style="font-size:12px;color:gray;"></div>

  <button onclick="saveDraft()">Сохранить</button>
  <button onclick="publish()">Опубликовать</button>
  <button onclick="closePanel()">Закрыть</button>
</div>

<div class="panel" id="myPanel"></div>

<div class="panel" id="infoPanel" style="height:25vh;">
  <div class="handle" onclick="closeInfo()">—</div>
  <div id="infoContent"></div>
</div>

<script>

const tg = window.Telegram.WebApp;
tg.expand();

const API = "YOUR_API_URL";

let map;
let current = null;
let tempMarker = null;
let userMarker = null;
let userCircle = null;
const ALLOWED_RADIUS = 15; // радиус = 15м (диаметр 30м)
let photos = [];

let editMode = false;
let editId = null;

let activeMarker = null;
let activePointId = null;

let createMode = false;

let userZoomChanged = false;
let panelOpen = false;
let initialLocationSet = false;
let pointConfirmed = false;
const category = document.getElementById("category");
const access = document.getElementById("access");
const desc = document.getElementById("desc");

/* PANEL */
const ui = {
  open: null // "create" | "my" | "info" | null
};
const panelEl = document.getElementById("panel");
const infoPanel = document.getElementById("infoPanel");
const myPanel = document.getElementById("myPanel");
const title = document.getElementById("title");
const coords = document.getElementById("coords");

function setPanel(h){
  panelEl.style.height = (window.innerHeight * h) + "px";
}
function renderUI(){

  panelEl.style.display = "none";
  myPanel.style.display = "none";
  infoPanel.style.display = "none";

  if (ui.open === "create") {
    panelEl.style.display = "block";
  }

  if (ui.open === "my") {
    myPanel.style.display = "block";
  }

  if (ui.open === "info") {
    infoPanel.style.display = "block";
  }
}
function closeMyPanel(){
  myPanel.style.display = "none";
  ui.open = null;
  renderUI();
}

function closeInfoPanel(){
  infoPanel.style.display = "none";
  ui.open = null;
}

function closeCreatePanel(){
  panelEl.style.display = "none";
  ui.open = null;
}

function togglePanel(){
  panelOpen = !panelOpen;

  if (panelOpen) {
    setPanel(0.33);
  } else {
    setPanel(0.1);
  }
}

/* OFFSET */
function centerWithTop(lat, lng) {

  const zoom = map.getZoom();

  // 1. сначала ставим в центр
  map.setView([lat, lng], zoom, { animate: false });

  // ❗ ЖДЁМ ОДИН ТИК, чтобы карта реально обновилась
  setTimeout(() => {

    const size = map.getSize();

    // 🎯 хотим точку на 25% сверху
    const targetY = size.y * 0.25;

    const point = map.latLngToContainerPoint([lat, lng]);

    const offset = point.y - targetY;
      console.log("pointY:", point.y);
    console.log("targetY:", targetY);
    console.log("offset:", offset);

    map.panBy([0, offset], {
      animate: true,
      duration: 0.6
    });

  }, 50);
}

/* ICONS */
const icons = {
  "новая_точка":"📌",
  "рыбалка":"🎣",
  "платная рыбалка":"💰🎣",
  "кемпинг":"⛺",
  "пляж":"🏖️",
  "опасно":"⚠️",
  "родник":"💧",
  "пирс":"🌉"
};

function icon(cat){
  return L.divIcon({
    html:`<div style="font-size:22px">${icons[cat] || "📍"}</div>`,
    className:""
  });
}

/* INIT */
function init(){

  map = L.map('map', {
    center: [55, 37],
    zoom: 10,
    zoomControl: true
  });

  const normal = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');

  const sat = L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
  );

  normal.addTo(map);

  L.control.layers({
    "Обычная":normal,
    "Спутник":sat
  }).addTo(map);

  map.on("zoomend", ()=> {
  userZoomChanged = true;
});

map.on("dragstart", ()=> {
  userZoomChanged = true;
});

map.locate({
  watch: true,
  enableHighAccuracy: true,
  setView: false,
  maximumAge: 0,
  timeout: 10000
});

let geoSet = false;

map.on("locationfound", e => {

  const latlng = e.latlng;

  if (!geoSet) {
    setTimeout(() => {
      centerWithTop(latlng.lat, latlng.lng);
    }, 100);
    geoSet = true;
  }

  // 🔵 маркер пользователя
  if (!userMarker) {
    userMarker = L.marker(latlng, {
      icon: L.divIcon({
        className: "",
        html: `<div class="user-ring"></div>`
      })
    }).addTo(map);
  } else {
    userMarker.setLatLng(latlng);
  }

  // 🔵 круг — ВСЕГДА отдельно
  if (!userCircle) {
    userCircle = L.circle(latlng, {
      radius: ALLOWED_RADIUS,
      color: "#2a9d8f",
      weight: 1,
      fillOpacity: 0.05
    }).addTo(map);
  } else {
    userCircle.setLatLng(latlng);
  }

});
  map.on("click", e => {

    if (!createMode) return;

    current = e.latlng;

    if (!tempMarker) {

      tempMarker = L.marker(current, {
        icon: icon(category.value || "новая_точка"),
        draggable: true
      }).addTo(map);

      tempMarker.on("dragend", (ev) => {
        current = ev.target.getLatLng();
      });

      openPanel();
    } else {
      tempMarker.setLatLng(current);
    }
  });

  fillCategories();
  PointStore.sync();
}

function enableCreateMode(){

  createMode = true;
  pointConfirmed = true;

  const center = map.getCenter();

  current = {
    lat: center.lat,
    lng: center.lng
  };

  if (tempMarker) {
    map.removeLayer(tempMarker);
    tempMarker = null;
  }

  tempMarker = L.marker(current, {
    icon: icon("новая_точка"),
    draggable: true
  }).addTo(map);

  tempMarker.on("dragend", (e) => {
    current = e.target.getLatLng();
  });

  openPanel();
}

/* CATEGORY */
function fillCategories(){

  const sel = category;
  sel.innerHTML = "";

  Object.keys(icons).forEach(c => {
    let o = document.createElement("option");
    o.value = c;
    o.innerHTML = `${icons[c]} ${c}`;
    sel.appendChild(o);
  });

  // 🔥 ОДИН единственный обработчик изменения категории
  category.addEventListener("change", () => {

    // если временная точка уже создана — меняем иконку сразу
    if (tempMarker) {
      tempMarker.setIcon(icon(category.value));
    }

  });
}

/* PHOTO FIX */
const photosEl = document.getElementById("photos");
const camera = document.getElementById("camera");

function requestCamera(){

  if (!camera) return;

  if (document.activeElement) {
    document.activeElement.blur();
  }

  setTimeout(() => {
    camera.click();
  }, 100);
}

camera.onchange = e => {

  const file = e.target.files[0];
  if (!file) return;

  const status = document.getElementById("photoStatus");
  status.innerText = "📸 Загрузка фото...";

  const reader = new FileReader();

  reader.onload = ev => {

    photos.push(ev.target.result);

    renderPhotos();

    status.innerText = "✅ Фото загружено";

    camera.value = "";
  };

  reader.readAsDataURL(file);
};
function renderPhotos(){
  photosEl.innerHTML="";
  photos.forEach((p,i)=>{
    let img=document.createElement("img");
    img.src=p;
    img.onclick=()=>{ photos.splice(i,1); renderPhotos(); };
    photosEl.appendChild(img);
  });
}

function saveDraft(){

  // 🔴 1. блокировка пока фото грузится
  const status = document.getElementById("photoStatus");

  if (status && status.innerText === "📸 Загрузка фото...") {
    alert("Подожди, фото ещё загружается");
    return;
  }

  // 🔴 2. проверка точки
  if (!current || !current.lat || !current.lng) {
    alert("Сначала укажи точку на карте");
    return;
  }

  // 🔴 3. проверка геолокации
  if (!userMarker) {
    alert("Геолокация не определена. Подожди пару секунд.");
    return;
  }

  // 🔴 4. проверка расстояния
  const userLatLng = userMarker.getLatLng();
  const distance = map.distance(userLatLng, current);

  console.log("DISTANCE:", distance);

  if (distance > ALLOWED_RADIUS) {
    alert("Подойди ближе к точке (до 15 метров)");
    return;
  }

  // 🔵 5. загрузка массива
  let arr = JSON.parse(localStorage.getItem("points") || "[]");

  if (editMode) {

    arr = arr.map(p =>
      p.id === editId
        ? {
            ...p,
            category: category.value,
            access: access.value,
            desc: desc.value,
            photos: [...photos]
          }
        : p
    );

  } else {

    arr.push({
      id: Date.now(),
      lat: current.lat,
      lng: current.lng,
      category: category.value,
      access: access.value,
      desc: desc.value,
      photos: [...photos],
      status: "local"
    });
  }

  localStorage.setItem("points", JSON.stringify(arr));

  // 🔵 6. обновление карты
  PointStore.sync();

  // 🔵 7. очистка состояния фото
  photos = [];
  renderPhotos();

  const statusEl = document.getElementById("photoStatus");
  if (statusEl) statusEl.innerText = "";

  // 🔵 8. закрываем панель (ВАЖНО: в конце!)
  closePanel();

  createMode = false;
}
/* INFO */
function openInfo(p){
  panelOpen = true;

  activePointId = p.id;

  const box = document.getElementById("infoContent");

  box.innerHTML = `
    <b>${icons[p.category]} ${p.category}</b><br>
    📍 ${p.lat.toFixed(5)}, ${p.lng.toFixed(5)}<br>
    🚗 ${p.access}<br>
    📝 ${p.desc || ""}<br>
    ${(p.photos||[]).map(ph=>`<img src="${ph}" width="60">`).join("")}
    <button onclick="editPoint(${p.id})">✏️ Изменить</button>
    <button onclick="deletePoint(${p.id})">🗑 Удалить</button>
  `;

  infoPanel.style.display="block";
}

/* STORE */
const PointStore = {

  sync(){

    const arr = JSON.parse(localStorage.getItem("points") || "[]");

    if (!window.layer) {
      window.layer = L.layerGroup().addTo(map);
    } else {
      window.layer.clearLayers();
    }

    arr.forEach(p => {

      const m = L.marker([p.lat, p.lng], {
        icon: icon(p.category)
      });

      m._data = p;

      // 🔥 СИНХРОНИЗАЦИЯ ПОДСВЕТКИ ПРИ РЕНДЕРЕ
      if (p.id === activePointId) {
        setTimeout(() => {
          highlightMarker(m);
        }, 0);
      }

      m.on("click", () => {

        // 1. активная точка
        activePointId = p.id;

        // 2. подсветка
        highlightMarker(m);

        // 3. текущая позиция
        current = { lat: p.lat, lng: p.lng };

        // 4. центр карты
        centerWithTop(p.lat, p.lng);

        // 5. инфо панель
        openInfo(p);

        // 6. 🔥 синхронизация списка
        openMyPoints();
      });

      window.layer.addLayer(m);
    });
  }
};

/* HIGHLIGHT */
function highlightMarker(marker){

  // убрать старую подсветку
  if (activeMarker && activeMarker.getElement()) {
    activeMarker.getElement().classList.remove("selected-marker");
  }

  activeMarker = marker;

  // 🔥 ВАЖНО: ждать пока DOM появится
  setTimeout(() => {
    const el = marker.getElement();

    if (el) {
      el.classList.add("selected-marker");
    }
  }, 0);
}

/* MY POINTS */
function openMyPoints(){
  ui.open = "my";
  renderUI();
  const box = myPanel;
  panelEl.style.display = "none";
  infoPanel.style.display = "none";

  box.innerHTML = `
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <div class='handle' onclick='toggleMyPanel()'>—</div>
    <button onclick="closeMyPanel()" style="width:auto;padding:5px 10px;border-radius:8px;">✖</button>
  </div>
  <h3>Мои точки</h3>
`;

  const arr = JSON.parse(localStorage.getItem("points") || "[]");

  arr.forEach(p => {

    const d = document.createElement("div");

    // 🔥 подсветка выбранной точки
    if (p.id === activePointId) {
      d.classList.add("active-point");
    }

    d.style.padding = "10px";
    d.style.marginBottom = "8px";
    d.style.cursor = "pointer";

    d.innerHTML = `
      ${icons[p.category]} ${p.category}<br>
      <small>${p.desc || ""}</small><br><br>

      <button onclick="focusPoint(${p.lat},${p.lng})">📍 Показать</button>
      <button onclick="editPoint(${p.id})">✏️ Изменить</button>
      <button onclick="deletePoint(${p.id})">🗑 Удалить</button>
    `;

    // 🔥 КЛИК ПО БЛОКУ = ВЫБОР ТОЧКИ
    d.onclick = (e) => {

      // чтобы кнопки не ломали клик
      if (e.target.tagName === "BUTTON") return;

      activePointId = p.id;

      PointStore.sync();   // обновить карту
      openMyPoints();      // обновить список

      centerWithTop(p.lat, p.lng);
    };

    box.appendChild(d);
  });

  box.style.height = "33vh";
}

function toggleMyPanel(){
  if (myPanel.style.display === "none" || myPanel.style.display === "") {
    myPanel.style.display = "block";
    myPanel.style.height = "33vh";
  } else {
    myPanel.style.display = "none";
  }
}

function focusPoint(lat,lng){
  centerWithTop(lat,lng, true);
}

/* EDIT */
function editPoint(id){
  const arr=JSON.parse(localStorage.getItem("points")||"[]");
  const p=arr.find(x=>x.id===id);
  if(!p) return;

  editMode=true;
  editId=id;

  current={lat:p.lat,lng:p.lng};

  category.value=p.category;
  access.value=p.access;
  desc.value=p.desc;

  photos=[...(p.photos||[])];
  renderPhotos();

  title.innerText="✏️ Редактирование";

  closeInfo();
  centerWithTop(p.lat,p.lng);
  openPanel();
}

/* DELETE */
function deletePoint(id){
  let arr=JSON.parse(localStorage.getItem("points")||"[]");
  arr=arr.filter(x=>x.id!==id);

  localStorage.setItem("points",JSON.stringify(arr));

  PointStore.sync();
  closeInfo();
  openMyPoints();
}

/* PANEL */
function openPanel(){
  ui.open = "create";
  renderUI();

  panelOpen = true;

  if(current){
    coords.innerText=current.lat.toFixed(5)+", "+current.lng.toFixed(5);
  }
}

function closePanel(){

  if (!editMode && tempMarker) {
    map.removeLayer(tempMarker);
    tempMarker = null;
    current = null;
  }

  createMode = false;

  panelEl.style.display = "none";
  ui.open = null;
  panelOpen = false;

  editMode = false;
  editId = null;

  title.innerText = "📍 Новая точка";

  renderUI();
}
function closeInfo(){
  infoPanel.style.display = "none";
  ui.open = null;
  panelOpen = false;
  activePointId = null;
}

/* KEYBOARD FIX */
document.addEventListener("touchstart",e=>{
  if(!e.target.closest("textarea")){
    document.activeElement.blur();
  }
});

desc.addEventListener("focus", () => {
  setPanel(0.9);
});

desc.addEventListener("blur", () => {
  setTimeout(() => setPanel(0.33), 150);
});

function publish(){
  saveDraft();
  alert("✔ Точка сохранена");
}
init();

</script>
</body>
</html>
