<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>UhaMap</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, Arial;
    height:100vh;
    display:flex;
    flex-direction:column;
}

#map {
    flex:1;
    width:100%;
    z-index:1;
}

.point-form {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;

    background:white;
    padding:16px;
    border-radius:18px 18px 0 0;
    box-shadow:0 -5px 20px rgba(0,0,0,0.2);

    z-index:9999;

    max-height:70vh;
    overflow-y:auto;
}

.hidden { display:none; }

.coord-info {
    background:#e9f5ff;
    padding:8px;
    border-radius:10px;
    margin-bottom:10px;
    font-size:13px;
}

select, textarea {
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border-radius:10px;
    border:1px solid #ccc;
}

button {
    width:100%;
    padding:12px;
    border:none;
    border-radius:25px;
    font-weight:bold;
    background:#2a9d8f;
    color:white;
}

button.cancel {
    background:#ccc;
    margin-top:10px;
}

.loading {
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(0,0,0,0.8);
    color:#fff;
    padding:8px 16px;
    border-radius:20px;
    display:none;
    z-index:9999;
}
</style>
</head>

<body>

<div id="map"></div>
<div class="loading" id="loading">⏳ Сохранение...</div>

<div id="pointForm" class="point-form hidden">

    <div style="display:flex;justify-content:space-between;align-items:center;">
        <h3>📍 Новая точка</h3>
        <span onclick="closeForm()" style="cursor:pointer;">✖</span>
    </div>

    <div class="coord-info" id="coordInfo">Координаты: —</div>

    <select id="category">
        <option value="рыбалка">🎣 Рыбалка</option>
        <option value="платная рыбалка">💰 Платная рыбалка</option>
        <option value="кемпинг">⛺ Кемпинг</option>
        <option value="пляж">🏖️ Пляж</option>
        <option value="опасно">⚠️ Опасно</option>
        <option value="родник">💧 Родник</option>
    </select>

    <select id="access">
        <option value="легковой">Легковой</option>
        <option value="внедорожник">Внедорожник</option>
        <option value="пешком">Пешком</option>
        <option value="лодка">Лодка</option>
    </select>

    <textarea id="desc" placeholder="Описание"></textarea>

    <button onclick="savePoint()">Сохранить</button>
    <button class="cancel" onclick="closeForm()">Отмена</button>
</div>

<script>

const tg = window.Telegram.WebApp;
tg.expand();

const API = "YOUR_API_URL";

let map;
let current = null;
let markerTemp = null;

// ================= INIT =================
function initMap() {

    map = L.map('map').setView([55.75,37.61],11);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png')
        .addTo(map);

    map.on("click",(e)=>{
        current = e.latlng;

        if(markerTemp){
            map.removeLayer(markerTemp);
        }

        markerTemp = L.marker(current).addTo(map);

        document.getElementById("coordInfo").innerText =
            `📍 ${current.lat.toFixed(5)}, ${current.lng.toFixed(5)}`;

        openForm();
    });

    loadPoints(); // 🔥 теперь грузим с сервера
}

// ================= LOAD POINTS (FIX) =================
async function loadPoints(){

    const res = await fetch(API + "?action=getPoints");
    const data = await res.json();

    data.forEach(p => {

        if(p.status !== "approved") return;

        L.marker([p.lat, p.lng])
            .addTo(map)
            .bindPopup(`📍 ${p.category}<br>${p.description || ""}`);
    });
}

// ================= FORM =================
function openForm(){
    document.getElementById("pointForm").classList.remove("hidden");
}

function closeForm(){
    document.getElementById("pointForm").classList.add("hidden");
    current=null;

    if(markerTemp){
        map.removeLayer(markerTemp);
        markerTemp=null;
    }
}

// ================= SAVE (FIXED) =================
async function savePoint(){

    if(!current) return;

    const data = {
        lat: current.lat,
        lng: current.lng,
        category: document.getElementById("category").value,
        access: document.getElementById("access").value,
        description: document.getElementById("desc").value,

        // 🔥 ВАЖНО ДЛЯ BACKEND
        user_id: tg.initDataUnsafe?.user?.id,
        user_name: tg.initDataUnsafe?.user?.first_name
    };

    document.getElementById("loading").style.display="block";

    await fetch(API,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            action:"savePoint",
            data
        })
    });

    document.getElementById("loading").style.display="none";

    closeForm();

    alert("Отправлено на модерацию");
}

// ================= START =================
initMap();

</script>

</body>
</html>
